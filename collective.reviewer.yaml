# ACC collective preset — multimodel reviewer agentset (PR-MM3).
#
# Cheap/fast worker models do the bulk work; one powerful reviewer model
# critiques and advises revisions.  The reviewer's NEEDS_REVISE verdict
# re-issues the reviewed step via the arbiter's per-step critic loop
# (plan._maybe_reissue_for_revise) — so a small model's output is lifted
# by a strong reviewer at a fraction of running everything on the big
# model.
#
# model_id values reference models.yaml (acc.models registry); edit
# them to match the models you have configured.
#
# Apply:
#   ./acc-deploy.sh apply collective.reviewer.yaml

collective_id: sol-01

agents:
  # ── Cheap/fast workers ───────────────────────────────────────────────
  - role: coding_agent_implementer
    replicas: 2
    cluster_id: backend
    purpose: "Implement the planner's decomposed coding tasks."
    model: claude-haiku            # cheap worker model
    agent_id_prefix: impl

  - role: coding_agent_tester
    replicas: 1
    cluster_id: backend
    purpose: "Write + run tests against the implementer's output."
    model: claude-haiku
    agent_id_prefix: tester

  # ── Powerful reviewer (single-instance) ──────────────────────────────
  - role: reviewer
    replicas: 1
    cluster_id: backend
    purpose: "Review worker output; emit a verdict + advise revisions."
    model: claude-sonnet           # powerful reviewer model
    agent_id_prefix: reviewer
