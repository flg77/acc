# ACC Configuration — Standalone (Podman) defaults
# Override individual fields with environment variables (see .env.example)

deploy_mode: standalone   # standalone | rhoai

agent:
  role: ingester           # ingester | analyst | arbiter
  collective_id: sol-01
  heartbeat_interval_s: 30

signaling:
  backend: nats
  nats_url: nats://localhost:4222

vector_db:
  backend: lancedb
  lancedb_path: /app/data/lancedb
  # RHOAI overrides (ignored in standalone mode)
  milvus_uri: ""
  milvus_collection_prefix: acc_

llm:
  # ── Select a backend ─────────────────────────────────────────────────────
  # Supported: ollama | anthropic | vllm | llama_stack | openai_compat
  #
  # openai_compat is the recommended backend for all OpenAI-compatible
  # providers: OpenAI, Groq, Gemini, OpenRouter, HuggingFace TGI, Together,
  # Fireworks, LM Studio, Anyscale, and local vLLM endpoints.
  #
  # Use environment variables for secrets: ACC_LLM_API_KEY_ENV=GROQ_API_KEY
  # (points to the env var that holds the key — the key itself is never in config).
  # ─────────────────────────────────────────────────────────────────────────

  # ── Option A: Ollama (default — local, no auth) ──────────────────────────
  backend: ollama
  ollama_base_url: http://localhost:11434
  ollama_model: llama3.2:3b

  # ── Option B: vLLM / KServe (RHOAI, first-class) ─────────────────────────
  # backend: vllm
  # vllm_inference_url: http://vllm-service:8000/v1     # or ACC_VLLM_INFERENCE_URL
  # ollama_model: meta-llama/Llama-3.1-8B-Instruct      # model name as served by vLLM
  # # Universal fields (preferred for vllm too — take precedence when set):
  # base_url: http://vllm-service:8000/v1               # ACC_LLM_BASE_URL
  # model: meta-llama/Llama-3.1-8B-Instruct             # ACC_LLM_MODEL

  # ── Option C: OpenAI ─────────────────────────────────────────────────────
  # backend: openai_compat
  # base_url: https://api.openai.com/v1
  # model: gpt-4o
  # api_key_env: OPENAI_API_KEY         # env var name; set OPENAI_API_KEY in .env

  # ── Option D: Groq (ultra-fast inference) ────────────────────────────────
  # backend: openai_compat
  # base_url: https://api.groq.com/openai/v1
  # model: llama-3.3-70b-versatile
  # api_key_env: GROQ_API_KEY

  # ── Option E: Gemini (Google OpenAI-compat proxy) ─────────────────────────
  # backend: openai_compat
  # base_url: https://generativelanguage.googleapis.com/v1beta/openai
  # model: gemini-2.0-flash
  # api_key_env: GEMINI_API_KEY

  # ── Option F: OpenRouter (300+ models, single API key) ───────────────────
  # backend: openai_compat
  # base_url: https://openrouter.ai/api/v1
  # model: mistralai/mixtral-8x7b-instruct
  # api_key_env: OPENROUTER_API_KEY

  # ── Option G: HuggingFace Inference API ──────────────────────────────────
  # backend: openai_compat
  # base_url: https://api-inference.huggingface.co/v1
  # model: meta-llama/Llama-3.1-70B-Instruct
  # api_key_env: HF_TOKEN

  # ── Option H: Together AI ─────────────────────────────────────────────────
  # backend: openai_compat
  # base_url: https://api.together.xyz/v1
  # model: mistralai/Mixtral-8x7B-Instruct-v0.1
  # api_key_env: TOGETHER_API_KEY

  # ── Option I: Anthropic (native SDK, not OpenAI-compat) ──────────────────
  # backend: anthropic
  # anthropic_model: claude-sonnet-4-6

  # ── Option J: LM Studio (local, no auth) ──────────────────────────────────
  # backend: openai_compat
  # base_url: http://localhost:1234/v1
  # model: llama-3.2-3b-instruct     # matches model loaded in LM Studio
  # api_key_env: ""                  # empty = no Authorization header

  # ── Shared fields ─────────────────────────────────────────────────────────
  anthropic_model: claude-sonnet-4-6       # used when backend=anthropic
  llama_stack_url: ""                      # used when backend=llama_stack
  embedding_model: all-MiniLM-L6-v2
  embedding_model_path: /app/models/all-MiniLM-L6-v2

  # ── openai_compat tuning ─────────────────────────────────────────────────
  # request_timeout_s: 120   # HTTP timeout per inference call (ACC_LLM_TIMEOUT_S)
  # max_retries: 3           # retries on 429/5xx with exponential back-off (ACC_LLM_MAX_RETRIES)

observability:
  backend: log             # log | otel
  otel_service_name: acc-agent
  # OTEL_EXPORTER_OTLP_ENDPOINT from env when backend=otel

# Working memory — Redis (Phase 0b).
# Set ACC_REDIS_URL to enable Redis-backed working memory (role centroid,
# stress state, role history).  Leave empty to run with in-process state only.
# WARNING: in-process state is lost on pod restart; Redis is recommended for
# production deployments.
working_memory:
  url: ""         # e.g. redis://acc-redis:6379 — set via ACC_REDIS_URL
  password: ""    # set via ACC_REDIS_PASSWORD (populated from .env / K8s Secret)

# Security (Phase 0a — Ed25519 arbiter countersign verification).
# Set ACC_ARBITER_VERIFY_KEY env var to the Base64-encoded raw Ed25519 public key
# of the collective's arbiter.  When empty, only signature presence is checked
# (backward compatible; not suitable for production).
security:
  arbiter_verify_key: ""   # export ACC_ARBITER_VERIFY_KEY=<base64-pubkey>

# Role definition injected into CognitiveCore (ACC-6a).
# Override at runtime via NATS ROLE_UPDATE (arbiter countersign required).
# Loaded from ACC_ROLE_CONFIG_PATH (/app/acc-role.yaml) first if that file exists.
role_definition:
  # ingester: ingest and normalise raw signals from external sources
  purpose: "Ingest and normalise incoming data signals, extract structured records, and forward them to the collective bus."
  persona: concise           # concise | formal | exploratory | analytical
  task_types:
    - TASK_ASSIGN
    - SYNC_MEMORY
  seed_context: ""           # domain-specific priming injected into every LLM call
  allowed_actions:
    - publish_signal
    - write_episode
  category_b_overrides:
    token_budget: 2048
    rate_limit_rpm: 60
  version: "0.1.0"
  # Role-specific overrides per agent role (applied by the operator ConfigMap):
  # analyst:      purpose / seed_context differ; persona=analytical
  # synthesizer:  purpose / seed_context differ; persona=formal
  # arbiter:      purpose / seed_context differ; allowed_actions includes sign_role_update
  # observer:     CognitiveCore not instantiated for this role (REQ-CORE-008)
