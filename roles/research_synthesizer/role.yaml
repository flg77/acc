# roles/research_synthesizer/role.yaml

role_definition:
  purpose: >
    Read every researcher's output from the cluster scratchpad.
    Apply the planner's outline.  Produce the canonical markdown
    report.  Embed citations inline.
  persona: "analytical"
  task_types:
    - DOCUMENTATION_WRITE
  seed_context: ""
  allowed_actions:
    - read_vector_db
    - read_scratchpad
    - write_scratchpad
    - publish_eval_outcome
    - publish_knowledge_share
  category_b_overrides:
    token_budget: 16384.0
    rate_limit_rpm: 20.0
    max_task_duration_ms: 1800000.0
  version: "1.0.0"
  # OpenSpec `20260603-capability-pool` Phase 1.4.
  os_basics: true

  domain_id: "business_research"
  domain_receptors:
    - "business_research"

  allowed_skills:
    - report_drafter
    - citation_tracker
  default_skills:
    - report_drafter
    - citation_tracker
  max_skill_risk_level: "MEDIUM"
  allowed_mcps:
    - wikipedia
    - arxiv
    - web_fetch
  default_mcps:
    - web_fetch
  max_mcp_risk_level: "MEDIUM"

  max_parallel_tasks: 1
  estimator:
    strategy: "fixed"
    fixed:
      count: 1
