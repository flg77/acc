# roles/research_competitor/eval_rubric.yaml
# Sum to 1.0; security ≥ 10%.

criteria:
  vendor_coverage:
    weight: 0.30
    description: >
      Every vendor named in the planner's outline has a
      competitor_profile card.  Score: profiled / requested.

  factual_accuracy:
    weight: 0.25
    description: >
      Architecture + pricing claims match what the vendor's docs
      actually say.  Computed at critic-time via spot-fetch of a
      sample of source_urls.

  sourcing_density:
    weight: 0.20
    description: >
      Every vendor card carries ≥ 2 source_urls; secondary commentary
      sources do not substitute for vendor's own docs.

  architecture_depth:
    weight: 0.15
    description: >
      architecture_summary names runtime components, not just
      marketing positioning.

  security:
    weight: 0.10
    description: >
      No fabricated vendor releases / pricing / capabilities.
      Score: 1.0 = clean; 0.0 = at least one vendor card whose
      claims fail spot-check.
