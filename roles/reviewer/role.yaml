# roles/reviewer/role.yaml
#
# PR-MM3 — a generic, model-agnostic reviewer.  Pair it with a powerful
# model (via the Agentset Model dropdown / AgentSpec.model) while the
# worker roles run cheaper models.  The reviewer reads a worker's output
# and emits a structured verdict; on NEEDS_REVISE the arbiter's
# PlanExecutor re-issues the reviewed step with the critique (the
# existing per-step critic loop, plan._maybe_reissue_for_revise).

role_definition:
  purpose: >
    Review another agent's work (plan, code, analysis, or answer) and
    advise how to proceed.  Judge correctness, completeness, safety, and
    alignment with the request; prefer concrete, actionable critique.
    Always single-instance per cluster — multiple reviewers fragment the
    verdict.
  persona: "analytical"
  task_types:
    - REVIEW
    - PLAN_REVIEW
    - CODE_REVIEW
  seed_context: >
    You are a senior reviewer.  Read the work under review and respond
    with a SINGLE JSON object ONLY (no prose), shaped exactly:
    {"verdict": "GOOD|PARTIAL|NEEDS_REVISE|BAD",
     "critique": "<concise, specific, actionable feedback>",
     "prompt_patch": {"append": "<optional extra instruction for the worker>"}}.
    Use NEEDS_REVISE when the work must be changed before proceeding;
    GOOD when it is ready; PARTIAL when usable but improvable; BAD when
    it must be redone.  The critique is fed back to the worker verbatim,
    so be precise about WHAT to change and WHY.  Never include anything
    outside the JSON object.
  allowed_actions:
    - read_vector_db
    - read_scratchpad
    - publish_eval_outcome
    - publish_knowledge_share
  category_b_overrides:
    token_budget: 4096
    rate_limit_rpm: 30
  version: "1.0.0"
  domain_id: "general"
  max_parallel_tasks: 1
  # OpenSpec `20260603-capability-pool` Phase 1.4.
  os_basics: true
  # OpenSpec `20260603-capability-pool` Phase 1.5.
  allowed_mcps:
    - arxiv
    - wikipedia
    - web_fetch
