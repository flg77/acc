# roles/research_planner/role.yaml

role_definition:
  purpose: >
    Read the operator's research brief; produce the report outline +
    per-section research questions; publish the outline as a
    KNOWLEDGE_SHARE so all downstream researchers consume the same
    contract.
  persona: "analytical"
  task_types:
    - DOCUMENTATION_WRITE
    - CODE_GENERATE
  seed_context: ""
  allowed_actions:
    - read_vector_db
    - read_scratchpad
    - write_scratchpad
    - publish_eval_outcome
    - publish_knowledge_share
  category_b_overrides:
    token_budget: 4096.0
    rate_limit_rpm: 30.0
    max_task_duration_ms: 600000.0
  version: "1.0.0"
  # OpenSpec `20260603-capability-pool` Phase 1.4.
  os_basics: true

  domain_id: "business_research"
  domain_receptors:
    - "business_research"

  allowed_skills:
    - plan_outline
  default_skills:
    - plan_outline
  max_skill_risk_level: "MEDIUM"
  allowed_mcps:
    - web_fetch
    - wikipedia
    - arxiv
    - web_browser_harness
    - web_search_brave
  default_mcps:
    - web_search_brave
  max_mcp_risk_level: "HIGH"

  max_parallel_tasks: 1
  estimator:
    strategy: "fixed"
    fixed:
      count: 1
