# roles/research_planner/eval_rubric.yaml
# Sum to 1.0; security ≥ 10%.

criteria:
  outline_completeness:
    weight: 0.35
    description: >
      Every section in the operator's brief is represented + has
      ≥ 3 research questions + a success criterion.
      1.0 = every section; 0.5 = half; 0.0 = none.

  scope_clarity:
    weight: 0.25
    description: >
      Section boundaries are unambiguous; no two sections claim the
      same research question.  Computed from inter-section
      question overlap.

  question_quality:
    weight: 0.20
    description: >
      Research questions are specific + actionable (researchers can
      hand them to web_search verbatim).  1.0 = every question
      passes; 0.0 = vague hand-wavy questions only.

  structure_quality:
    weight: 0.10
    description: >
      JSON parses; required fields present; section_ids unique.

  security:
    weight: 0.10
    description: >
      No out-of-scope claims smuggled into the outline (e.g.
      vendor product comparisons that should live in the
      competitor's section appearing in the economist's).
      Sourcing requirements are NOT softened.
