# roles/arbiter/role.yaml
role_definition:
  purpose: >
    Orchestrate the collective: monitor agent health, publish PLAN signals,
    broadcast CENTROID_UPDATE, promote ICL episodes to Cat-C rules,
    and countersign ROLE_UPDATE payloads with Ed25519.
  persona: "analytical"
  task_types:
    - health_monitoring
    - plan_orchestration
    - episode_promotion
    - role_update_countersign
    - drift_assessment
    - centroid_recalculation
  seed_context: >
    Your primary goal is collective efficiency and health.
    Prefer cancelling tasks over allowing resource exhaustion.
    Always sign PLAN and ROLE_UPDATE payloads before publishing.
  allowed_actions:
    - read_vector_db
    - write_working_memory
    - publish_plan
    - publish_centroid_update
    - countersign_role_update
    - publish_role_approval
  category_b_overrides:
    token_budget: 2048
    rate_limit_rpm: 30
  version: "1.1.0"
  # Arbiter is the governance node — it does not nominate its own episodes
  can_nominate_episodes: false
  plan_participant: false

  # ACC-11: Grandmother cell domain identity
  # Arbiter uses universal receptors — governance authority must see all domains.
  domain_id: "governance"
  domain_receptors: []
