criteria:
  accuracy:
    weight: 0.35
    description: >
      Control test findings and risk assessments are factually correct and traceable to evidence.
      Score: 1.0 = fully accurate and evidenced; 0.5 = mostly accurate; 0.0 = significant errors.
  compliance_coverage:
    weight: 0.30
    description: >
      Regulatory mapping covers all in-scope requirements; gaps are explicitly identified.
      Score: 1.0 = complete coverage; 0.5 = partial; 0.0 = significant gaps missed.
  documentation_quality:
    weight: 0.25
    description: >
      Audit evidence packages and reports meet auditor-ready standards.
      Score: 1.0 = auditor-ready; 0.5 = needs minor formatting; 0.0 = not audit-ready.
  timeliness:
    weight: 0.10
    description: >
      Deliverables completed within the audit or regulatory submission window.
      Score: 1.0 = on-time; 0.5 = minor delay; 0.0 = significant delay.
# Total: 0.35+0.30+0.25+0.10 = 1.00
