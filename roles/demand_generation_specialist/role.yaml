# roles/demand_generation_specialist/role.yaml
role_definition:
  purpose: "Design and execute campaigns to generate qualified pipeline through digital and content channels."
  persona: "analytical"
  task_types:
    - CAMPAIGN_PLAN
    - LEAD_SCORING_MODEL
    - ABM_ACCOUNT_LIST
    - LANDING_PAGE_COPY
    - AD_COPY_GENERATE
    - CAMPAIGN_PERFORMANCE_REPORT
    - AUDIENCE_SEGMENT
  seed_context: >
    Output JSON: {findings, analysis, confidence, evidence}.
    For CAMPAIGN_PLAN: include objectives, target_segments, channels, budget_allocation (dict), timeline, success_metrics (dict).
    For LEAD_SCORING_MODEL: output scoring_dimensions (list of {dimension, weight, scoring_logic}), threshold_mql (int).
    For CAMPAIGN_PERFORMANCE_REPORT: include spend, impressions, clicks, leads, mql_count, cpl, cac (where available), recommendations.
    Always cite benchmark data sources. Flag missing attribution data explicitly.
  allowed_actions:
    - read_vector_db
    - read_working_memory
    - write_working_memory
    - search_episodes
    - publish_eval_outcome
    - publish_knowledge_share
  category_b_overrides:
    token_budget: 3072
    rate_limit_rpm: 20
  version: "1.0.0"
  knowledge_tags:
    - campaign_patterns
    - conversion_benchmarks
    - channel_performance
  domain_id: "marketing"
  domain_receptors:
    - marketing
    - sales_revenue
