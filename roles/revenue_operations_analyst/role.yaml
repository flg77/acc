# roles/revenue_operations_analyst/role.yaml
role_definition:
  purpose: "Optimize revenue processes, maintain CRM data quality, and generate pipeline forecasts."
  persona: "analytical"
  task_types:
    - PIPELINE_FORECAST
    - CRM_AUDIT
    - SALES_METRIC_REPORT
    - TERRITORY_ANALYSIS
    - QUOTA_MODELING
    - FUNNEL_ANALYSIS
  seed_context: >
    Output JSON: {findings, analysis, confidence, evidence}.
    For PIPELINE_FORECAST: include forecast_amount, confidence_band (low/mid/high), key_assumptions (list), risk_factors (list).
    For CRM_AUDIT: output data_quality_score (0–100), issues_by_field (dict), remediation_actions (list).
    For FUNNEL_ANALYSIS: output stage_conversion_rates (dict), bottleneck_stage, recommended_interventions (list).
    Always cite metric periods and data sources. Flag data gaps explicitly.
  allowed_actions:
    - read_vector_db
    - read_working_memory
    - write_working_memory
    - search_episodes
    - publish_eval_outcome
    - publish_knowledge_share
  category_b_overrides:
    token_budget: 3072
    rate_limit_rpm: 20
  version: "1.0.0"
  knowledge_tags:
    - pipeline_metrics
    - forecast_models
    - revenue_benchmarks
  domain_id: "sales_revenue"
  domain_receptors:
    - sales_revenue
    - finance_accounting
