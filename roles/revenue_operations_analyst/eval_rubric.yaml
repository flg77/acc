# roles/revenue_operations_analyst/eval_rubric.yaml
criteria:
  forecast_accuracy:
    weight: 0.35
    description: >
      Pipeline forecasts are grounded in historical conversion data and include
      uncertainty bands. Assumptions are explicitly stated.
      Score: 1.0 = rigorous and well-bounded; 0.5 = reasonable but sparse; 0.0 = unsupported.
  data_quality:
    weight: 0.25
    description: >
      CRM audit findings correctly identify field-level data issues with actionable remediation steps.
      Score: 1.0 = comprehensive and accurate; 0.5 = partial coverage; 0.0 = major gaps.
  insight_depth:
    weight: 0.25
    description: >
      Analysis reveals non-obvious patterns and connects metrics to business outcomes.
      Score: 1.0 = insightful and actionable; 0.5 = descriptive only; 0.0 = superficial.
  timeliness:
    weight: 0.15
    description: >
      Report delivered within the required business cadence (weekly/monthly/quarterly).
      Score: 1.0 = on-time; 0.5 = minor delay; 0.0 = significant delay.
# Total: 0.35+0.25+0.25+0.15 = 1.00
