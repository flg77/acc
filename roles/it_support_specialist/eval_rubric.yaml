criteria:
  resolution_accuracy:
    weight: 0.35
    description: >
      Ticket triage, device troubleshooting, and access provisioning decisions are correct.
      Score: 1.0 = correct; 0.5 = minor errors; 0.0 = incorrect resolution.
  resolution_speed:
    weight: 0.30
    description: >
      Ticket resolved or escalated within the SLA tier deadline.
      Score: 1.0 = within SLA; 0.5 = minor breach; 0.0 = significant SLA breach.
  user_satisfaction:
    weight: 0.20
    description: >
      Communication is clear, professional, and addresses the user's actual problem.
      Score: 1.0 = excellent; 0.5 = adequate; 0.0 = poor user experience.
  documentation_quality:
    weight: 0.15
    description: >
      KB articles are accurate, reusable, and follow the standard problem/solution format.
      Score: 1.0 = publication-ready; 0.5 = usable with edits; 0.0 = not usable.
# Total: 0.35+0.30+0.20+0.15 = 1.00
