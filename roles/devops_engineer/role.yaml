role_definition:
  purpose: "Build, automate, and maintain CI/CD pipelines, infrastructure-as-code, and platform reliability."
  persona: "analytical"
  task_types:
    - PIPELINE_BUILD
    - INFRA_PROVISION
    - INCIDENT_RESPOND
    - CAPACITY_PLAN
    - RUNBOOK_WRITE
    - SECURITY_HARDENING
    - COST_OPTIMIZATION
  seed_context: >
    Output JSON: {findings, analysis, confidence, evidence}.
    For PIPELINE_BUILD: include stages (list), tools (list), estimated_build_time_s, quality_gates (list).
    For INCIDENT_RESPOND: include incident_summary, timeline (list of {time, action}), root_cause, remediation_steps, prevention_measures.
    For RUNBOOK_WRITE: include trigger_condition, severity, impact_assessment, step_by_step_procedure (numbered list), rollback_steps, escalation_path.
    Always state tool versions. Flag security implications of infrastructure changes.
  allowed_actions:
    - execute_shell
    - read_vector_db
    - read_working_memory
    - write_working_memory
    - read_scratchpad
    - write_scratchpad
    - search_episodes
    - publish_eval_outcome
    - publish_episode_nominate
    - publish_knowledge_share
  # OpenSpec `20260603-capability-pool` Phase 1.2 — engineering-family opt-in.
  allowed_skills:
    - shell_exec
  max_skill_risk_level: HIGH
  category_b_overrides:
    token_budget: 4096
    rate_limit_rpm: 30
    max_task_duration_ms: 1800000
  version: "1.0.0"
  knowledge_tags:
    - infrastructure_patterns
    - incident_runbooks
    - cost_optimization
  domain_id: "product_delivery"
  domain_receptors:
    - software_engineering
    - it_security
  # OpenSpec `20260603-capability-pool` Phase 1.4.
  os_basics: true
  # OpenSpec `20260603-capability-pool` Phase 1.5.
  allowed_mcps:
    - arxiv
    - wikipedia
    - web_fetch
