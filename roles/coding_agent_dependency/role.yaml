# roles/coding_agent_dependency/role.yaml

role_definition:
  # Proposal 004 — declared parent in the role hierarchy.
  parent_role: coding_agent
  purpose: >
    Audit pyproject.toml / requirements.txt / package.json
    declarations for known-vulnerable versions and license
    incompatibilities.  Single instance per cluster — output is
    fed into a downstream PLAN step, not a sibling cluster member.
  persona: "analytical"
  task_types:
    - DEPENDENCY_AUDIT
    - SECURITY_SCAN
  seed_context: ""
  allowed_actions:
    - execute_shell
    - execute_ssh
    - read_vector_db
    - read_scratchpad
    - publish_eval_outcome
    - publish_knowledge_share
  category_b_overrides:
    token_budget: 4096.0
    rate_limit_rpm: 30.0
    max_task_duration_ms: 600000.0
  version: "1.0.0"
  # OpenSpec `20260603-capability-pool` Phase 1.4.
  os_basics: true

  domain_id: "security_audit"
  domain_receptors:
    - "security_audit"
    - "software_engineering"

  allowed_skills:
    - shell_exec
    - ssh_exec
    - dependency_audit
    - security_scan
  default_skills:
    - dependency_audit
    - security_scan
  max_skill_risk_level: HIGH
  workspace_access: true   # D-007 PR-U2 — coding subrole works in the trusted workspace
  allowed_mcps:
    - web_fetch
    - wikipedia
    - arxiv
    - echo_server
  default_mcps:
    - echo_server
  max_mcp_risk_level: "MEDIUM"

  max_parallel_tasks: 1
  estimator:
    strategy: "fixed"
    fixed:
      count: 1
