# roles/coding_agent_implementer/role.yaml

role_definition:
  # Proposal 004 — declared parent in the role hierarchy.
  parent_role: coding_agent
  purpose: >
    Fill in the implementation bodies for one or more modules given
    a stable interface (from a peer architect's draft_interface or
    from the inbound task description).  Multi-instance: clusters
    get sliced file ownership via the arbiter's slice_skill_mix
    round-robin.
  persona: "analytical"
  task_types:
    - CODE_GENERATE
    - REFACTOR
  seed_context: ""
  allowed_actions:
    - read_vector_db
    - write_working_memory
    - read_scratchpad
    - write_scratchpad
    - publish_task
    - publish_eval_outcome
    - publish_knowledge_share
  category_b_overrides:
    token_budget: 4096.0
    rate_limit_rpm: 40.0
    max_task_duration_ms: 1200000.0
  version: "1.0.0"

  domain_id: "software_engineering"
  domain_receptors:
    - "software_engineering"

  allowed_skills:
    - code_generation
    - code_review
  default_skills:
    - code_generation
  max_skill_risk_level: "MEDIUM"
  workspace_access: true   # D-007 PR-U2 — coding subrole works in the trusted workspace
  allowed_mcps:
    - echo_server
  default_mcps:
    - echo_server
  max_mcp_risk_level: "MEDIUM"

  max_parallel_tasks: 4
  estimator:
    strategy: "heuristic"
    heuristic:
      base: 1
      per_n_tokens: 1500
      skill_per_subagent: 2
      cap: 4
    difficulty_signals:
      - keyword: "concurrency"
        bump: 1
      - keyword: "refactor"
        bump: 1
