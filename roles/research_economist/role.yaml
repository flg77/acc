# roles/research_economist/role.yaml

role_definition:
  purpose: >
    Produce TAM/SAM/SOM market-size estimates for the agentic-AI
    market overall and the edge sub-market.  Cite every number to a
    public source.  Forecast 3/5/10-year horizons with sensitivity
    analysis.  Multi-instance: clusters get sliced research
    questions via the arbiter's slice_skill_mix round-robin.
  persona: "analytical"
  task_types:
    - DOCUMENTATION_WRITE
    - CODE_GENERATE
  seed_context: ""
  allowed_actions:
    - read_vector_db
    - read_scratchpad
    - write_scratchpad
    - publish_eval_outcome
    - publish_knowledge_share
  category_b_overrides:
    token_budget: 8192.0
    rate_limit_rpm: 30.0
    max_task_duration_ms: 1800000.0
  version: "1.0.0"

  domain_id: "economic_analysis"
  domain_receptors:
    - "business_research"
    - "economic_analysis"

  allowed_skills:
    - market_sizer
    - citation_tracker
    - report_drafter
  default_skills:
    - market_sizer
    - citation_tracker
  max_skill_risk_level: "MEDIUM"
  allowed_mcps:
    - web_browser_harness
    - web_search_brave
    - web_fetch
  default_mcps:
    - web_browser_harness
    - web_fetch
  max_mcp_risk_level: "HIGH"

  max_parallel_tasks: 3
  estimator:
    strategy: "heuristic"
    heuristic:
      base: 1
      per_n_tokens: 4000
      skill_per_subagent: 2
      cap: 3
    difficulty_signals:
      - keyword: "forecast"
        bump: 1
      - keyword: "edge"
        bump: 1
