# nginx config for the ACC console plugin (proposal 035, PR-1).
# Serves the static module-federation bundle from /usr/share/nginx/html.
# The OpenShift console fetches plugin-manifest.json + the federated chunks
# cross-origin, so CORS must be permissive (read-only static assets only).
# Listens on 8080 (UBI nginx unprivileged default; pod runs as uid 1001).

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  access_log /dev/stdout;

  # Writable temp paths so the container can run as a non-root, read-only-ish FS.
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types application/javascript application/json text/css image/svg+xml;

  server {
    listen 8080;
    root /usr/share/nginx/html;

    location / {
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
      add_header Cache-Control 'no-cache' always;
      try_files $uri $uri/ =404;
    }
  }
}
