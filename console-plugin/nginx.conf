# nginx config for the ACC console plugin (proposal 035, PR-4 — OLM wiring).
# Serves the static module-federation bundle from /usr/share/nginx/html over
# TLS :9443. The OpenShift console fetches plugin-manifest.json + the federated
# chunks cross-origin and ONLY over HTTPS (the console itself is TLS), so we
# terminate TLS here with the OpenShift service-serving cert.
#
# The cert is minted by the service-ca operator from the Service annotation
# `service.beta.openshift.io/serving-cert-secret-name: acc-console-plugin-serving-cert`
# and projected into the pod at /var/serving-cert (tls.crt + tls.key) by the
# Deployment's volumeMount. The console trusts service-ca-signed certs by
# default, so no extra CA wiring is needed.
#
# Runs as uid 1001 / group 0 on a read-only-ish FS: all writable paths live
# under /tmp and the pid under /tmp so the container needs no root.

worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  # Federated entry/chunks are .js; the console requires the correct JS MIME or
  # the browser refuses to execute the module. mime.types already maps
  # .js -> application/javascript; keep the default for everything else.
  default_type application/octet-stream;
  access_log /dev/stdout;

  # Writable temp paths so the container runs as a non-root user on a
  # read-only root filesystem.
  client_body_temp_path /tmp/client_temp;
  proxy_temp_path /tmp/proxy_temp;
  fastcgi_temp_path /tmp/fastcgi_temp;
  uwsgi_temp_path /tmp/uwsgi_temp;
  scgi_temp_path /tmp/scgi_temp;

  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types application/javascript application/json text/css image/svg+xml;

  server {
    # TLS plugin port — matches the Service targetPort, the Deployment
    # containerPort, and the ConsolePlugin spec.backend.service.port.
    listen 9443 ssl;
    ssl_certificate     /var/serving-cert/tls.crt;
    ssl_certificate_key /var/serving-cert/tls.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root /usr/share/nginx/html;

    # The console loads the bundle cross-origin; static read-only assets so a
    # permissive CORS policy is safe (no credentials, GET/OPTIONS only).
    location / {
      add_header Access-Control-Allow-Origin '*' always;
      add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
      try_files $uri $uri/ =404;
    }

    # The plugin manifest is the version pointer the console re-reads to pick up
    # a new bundle; it must never be cached or upgrades silently won't load.
    location = /plugin-manifest.json {
      add_header Access-Control-Allow-Origin '*' always;
      add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
      add_header Cache-Control 'no-cache' always;
      try_files $uri =404;
    }
  }
}
