# acc-webgui — mTLS sidecar (nginx) for the `mtls` auth mode.
#
# acc-webgui's `mtls` mode does not terminate TLS itself — uvicorn does
# not surface the peer certificate to the app.  Instead a TLS-terminating
# front layer verifies the client certificate against a local CA and
# injects the verified identity as a header that acc-webgui trusts
# (exactly the trust model of the `oauth-proxy` mode).
#
# This is that front layer for standalone / edge (Podman, MicroShift as a
# pod sidecar).  On an OpenShift / MicroShift cluster the router can do
# re-encrypt + client-cert verification instead, injecting the same two
# headers — then this sidecar is not needed.
#
# Deploy (standalone, both containers on the host network):
#   acc-webgui:  ACC_WEBGUI_AUTH_MODE=mtls  ACC_WEBGUI_HOST=127.0.0.1
#   nginx:       podman run --network host \
#                  -v ./nginx-mtls-sidecar.conf:/etc/nginx/nginx.conf:ro,z \
#                  -v ./tls:/etc/nginx/tls:ro,z  docker.io/library/nginx:stable
#   → https://<host>:8443   (a CA-signed client cert is required)
#
# Certificate material expected under /etc/nginx/tls:
#   server.crt / server.key  — the webgui's own TLS server certificate
#   client-ca.crt            — the CA that signed operator client certs
#
# SECURITY — non-negotiable:
#   * acc-webgui MUST bind 127.0.0.1 so it is reachable ONLY via nginx;
#     a direct connection could forge the X-Client-Cert-* headers.
#   * nginx MUST overwrite (not append) the X-Client-Cert-* headers so a
#     spoofed inbound copy cannot survive — `proxy_set_header` below
#     replaces them unconditionally.
#   * The header value form must match the ACC_WEBGUI_OPERATOR_USERS
#     entries — this sample sends the bare CN ($ssl_client_s_dn_cn).

worker_processes 1;
events { worker_connections 256; }

http {
    # The verify result reaches acc-webgui as a fixed SUCCESS/FAILED
    # string; nginx's $ssl_client_verify is SUCCESS / FAILED / NONE.
    map $ssl_client_verify $cert_verify {
        default "FAILED";
        "SUCCESS" "SUCCESS";
    }

    server {
        listen 8443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/tls/server.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;

        # Require + verify a client certificate against the local CA.
        ssl_client_certificate /etc/nginx/tls/client-ca.crt;
        ssl_verify_client      on;
        ssl_verify_depth       2;

        location / {
            proxy_pass http://127.0.0.1:8080;

            # Inject the verified client identity.  These overwrite any
            # inbound X-Client-Cert-* header (anti-spoofing).
            proxy_set_header X-Client-Cert-Verify  $cert_verify;
            proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn_cn;

            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
        }

        # WebSocket — forward the upgrade headers.  access_log is off so
        # a ?token= query string (used by token/oidc/htpasswd modes, not
        # mtls) is never written to disk.
        location /ws/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Client-Cert-Verify  $cert_verify;
            proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn_cn;
            proxy_read_timeout 3600s;
            access_log off;
        }
    }
}
