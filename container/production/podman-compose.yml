# ACC production deployment (Podman)
#
# All images use Red Hat UBI bases (registry.access.redhat.com).
# This file references the production/ Containerfiles with all known bugs fixed.
#
# Differences from container/beta/podman-compose.yml:
#   - NATS uses a UBI9-based custom build (Containerfile.nats) instead of nats:alpine
#   - All build: blocks reference container/production/ Containerfiles
#   - Image tags are pinned to ACC_VERSION (not :latest)
#   - TUI service added (disabled by default; enable with --profile tui)
#   - OpenShift operator uses this compose as fallback reference
#
# Run:
#   cd <repo root>
#   podman-compose -f container/production/podman-compose.yml up -d
#
# First build:
#   podman-compose -f container/production/podman-compose.yml build
#
# With TUI:
#   podman-compose -f container/production/podman-compose.yml --profile tui up -d
#
# If Podman logs show "aardvark-dns runs in a different netns" (stale aardvark):
#   podman stop -a; killall aardvark-dns 2>/dev/null
#   rm -rf /run/user/$UID/containers/networks/aardvark-dns
#   podman-compose -f container/production/podman-compose.yml up -d

version: "3.9"

x-acc-version: &acc-version "0.2.0"

networks:
  acc-net:
    driver: bridge

volumes:
  lancedb-data:
  redis-data:
  nats-data:
  # acc-tui-logs holds the rotating acc-tui.log file (5MB × 3 backups).
  # Inspect from host:
  #   podman volume inspect acc-tui-logs --format '{{.Mountpoint}}'
  # Or follow live:
  #   tail -f $(podman volume inspect acc-tui-logs --format '{{.Mountpoint}}')/acc-tui.log
  acc-tui-logs:
  # PR-Y-2 — writable golden-prompt store.  Operator-authored prompts
  # (Diagnostics editor) + captured executed prompts land here.  A
  # named volume (mounted :U) is writable by the uid-1001 TUI without
  # the host-uid mismatch a bind mount would hit.
  acc-golden-data:
  # PR-Z2 — imported compliance framework catalogs (BSI / custom) +
  # generated gap-analysis audit reports.  Named volumes (:U) so the
  # uid-1001 TUI can write them.
  acc-frameworks-data:
  acc-compliance-data:
  # Role-split (Stage 2): shared install-root for packaged roles/skills/MCPs
  # (@acc/workspace-roles etc.).  ACC_PACKAGES_ROOT defaults to
  # /var/lib/acc/packages, so mounting the volume there needs no env override.
  # Populated by the boot-time fetch (`acc-cli collective pkg-install`); the
  # dual-source RoleLoader resolves installed roles from here, in-tree roles
  # (the 7 control roles) otherwise.
  acc-packages:

services:

  # ── NATS JetStream (UBI9-based production build) ──────────────────────────
  # Custom build: nats-server binary on UBI9 minimal.
  # See container/production/Containerfile.nats for details.
  nats:
    build:
      context: ../..
      dockerfile: container/production/Containerfile.nats
      args:
        NATS_VERSION: "2.10.22"
    image: localhost/acc-nats:2.10.22
    container_name: acc-nats
    # Default: flags-only, no authentication (unchanged).
    command: ["-js", "-m", "8222", "--store_dir", "/data/jetstream"]
    # ── NATS NKey authentication (proposal 013, opt-in) ──────────────
    # To enable per-role NKey auth on standalone:
    #   1. ./scripts/acc-nkeys generate    --out-dir ./nkeys
    #   2. ./scripts/acc-nkeys render-conf --keys-dir ./nkeys \
    #          --out ./nats.conf
    #   3. comment out the `command:` above and uncomment both the
    #      `command:` and the nats.conf volume line below;
    #   4. set ACC_NKEY_ENABLED=true + ACC_NKEY_SEED_PATH on every
    #      ACC service (see docs/nats-nkeys.md).
    # command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"   # client connections
      - "8222:8222"   # HTTP monitoring
    volumes:
      - nats-data:/data/jetstream
      # - ./nats.conf:/etc/nats/nats.conf:ro,z   # proposal 013 (opt-in)
    networks:
      - acc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nats-server", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Redis (working memory, UBI9 + EPEL) ──────────────────────────────────
  # Set REDIS_PASSWORD in .env to enable authentication.
  # When empty, Redis starts without auth (dev/CI only).
  acc-redis:
    build:
      context: ../..
      dockerfile: container/production/Containerfile.redis
    image: localhost/acc-redis:7.2
    container_name: acc-redis
    env_file:
      - path: ../../.env
        required: false
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/var/lib/redis/data
    networks:
      - acc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/usr/local/bin/redis-healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Agent: Ingester ───────────────────────────────────────────────────────
  acc-agent-ingester:
    build:
      context: ../..
      dockerfile: container/production/Containerfile.agent-core
      args:
        ACC_VERSION: *acc-version
    image: localhost/acc-agent-core:0.2.0
    container_name: acc-agent-ingester
    depends_on:
      nats:
        condition: service_healthy
      acc-redis:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_AGENT_ROLE: ingester
      ACC_COLLECTIVE_ID: sol-01
      ACC_NATS_URL: nats://nats:4222
      ACC_LANCEDB_PATH: /app/data/lancedb/ingester
      ACC_REDIS_URL: redis://acc-redis:6379
      ACC_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # v0.3.40 — PR-MEM2 reflection loop default cadence (10 min).
      # Without this set, _reflection_loop returns immediately and
      # memory_notes stays empty forever (silent since PR-MEM2 shipped
      # in v0.3.1; only became visible after v0.3.37 unblocked the
      # episode-persist producer side).  Set to 0 to disable per service.
      ACC_REFLECTION_INTERVAL_S: ${ACC_REFLECTION_INTERVAL_S:-600}
    volumes:
      - lancedb-data:/app/data/lancedb:U,z
      - acc-packages:/var/lib/acc/packages:U,z
      # D-007 (PR-U2b) -- trusted workspace, SELinux-labelled (:z).
      - ${ACC_WORKSPACE_HOST_DIR:-../../workspaces}:/workspace:z
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
    networks:
      - acc-net
    restart: unless-stopped

  # ── Agent: Analyst ────────────────────────────────────────────────────────
  acc-agent-analyst:
    image: localhost/acc-agent-core:0.2.0
    container_name: acc-agent-analyst
    depends_on:
      nats:
        condition: service_healthy
      acc-redis:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_AGENT_ROLE: analyst
      ACC_COLLECTIVE_ID: sol-01
      ACC_NATS_URL: nats://nats:4222
      ACC_LANCEDB_PATH: /app/data/lancedb/analyst
      ACC_REDIS_URL: redis://acc-redis:6379
      ACC_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # v0.3.40 — PR-MEM2 reflection loop default cadence (10 min).
      # Without this set, _reflection_loop returns immediately and
      # memory_notes stays empty forever (silent since PR-MEM2 shipped
      # in v0.3.1; only became visible after v0.3.37 unblocked the
      # episode-persist producer side).  Set to 0 to disable per service.
      ACC_REFLECTION_INTERVAL_S: ${ACC_REFLECTION_INTERVAL_S:-600}
    volumes:
      - lancedb-data:/app/data/lancedb:U,z
      - acc-packages:/var/lib/acc/packages:U,z
      # D-007 (PR-U2b) -- trusted workspace, SELinux-labelled (:z).
      - ${ACC_WORKSPACE_HOST_DIR:-../../workspaces}:/workspace:z
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
    networks:
      - acc-net
    restart: unless-stopped

  # ── Agent: Arbiter ────────────────────────────────────────────────────────
  acc-agent-arbiter:
    image: localhost/acc-agent-core:0.2.0
    container_name: acc-agent-arbiter
    depends_on:
      nats:
        condition: service_healthy
      acc-redis:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_AGENT_ROLE: arbiter
      ACC_COLLECTIVE_ID: sol-01
      ACC_NATS_URL: nats://nats:4222
      ACC_LANCEDB_PATH: /app/data/lancedb/arbiter
      ACC_REDIS_URL: redis://acc-redis:6379
      ACC_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # v0.3.40 — PR-MEM2 reflection loop default cadence (10 min).
      # Without this set, _reflection_loop returns immediately and
      # memory_notes stays empty forever (silent since PR-MEM2 shipped
      # in v0.3.1; only became visible after v0.3.37 unblocked the
      # episode-persist producer side).  Set to 0 to disable per service.
      ACC_REFLECTION_INTERVAL_S: ${ACC_REFLECTION_INTERVAL_S:-600}
    volumes:
      - lancedb-data:/app/data/lancedb:U,z
      - acc-packages:/var/lib/acc/packages:U,z
      # D-007 (PR-U2b) -- trusted workspace, SELinux-labelled (:z).
      - ${ACC_WORKSPACE_HOST_DIR:-../../workspaces}:/workspace:z
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
    networks:
      - acc-net
    restart: unless-stopped

  # ── Agent: Assistant (AoA gatekeeper, v0.3.24+) ──────────────────────────
  # AoA-P1 made `assistant` the default TUI Prompt target.  Without a
  # container subscribed to assistant's bus subjects, every default-target
  # prompt times out at 180s.  Ships as baseline so `./acc-deploy.sh up`
  # brings the gatekeeper live by default.
  acc-agent-assistant:
    image: localhost/acc-agent-core:0.2.0
    container_name: acc-agent-assistant
    depends_on:
      nats:
        condition: service_healthy
      acc-redis:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_AGENT_ROLE: assistant
      ACC_AGENT_ID: assistant-1
      ACC_COLLECTIVE_ID: sol-01
      ACC_NATS_URL: nats://nats:4222
      ACC_LANCEDB_PATH: /app/data/lancedb/assistant-1
      ACC_REDIS_URL: redis://acc-redis:6379
      ACC_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # v0.3.40 — PR-MEM2 reflection loop default cadence (10 min).
      # Without this set, _reflection_loop returns immediately and
      # memory_notes stays empty forever (silent since PR-MEM2 shipped
      # in v0.3.1; only became visible after v0.3.37 unblocked the
      # episode-persist producer side).  Set to 0 to disable per service.
      ACC_REFLECTION_INTERVAL_S: ${ACC_REFLECTION_INTERVAL_S:-600}
    volumes:
      - lancedb-data:/app/data/lancedb:U,z
      - acc-packages:/var/lib/acc/packages:U,z
      - ${ACC_WORKSPACE_HOST_DIR:-../../workspaces}:/workspace:z
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
      - ../../roles:/app/roles:ro,z
    networks:
      - acc-net
    restart: unless-stopped

  # ── Agent: Coding worker (v0.3.24+) ──────────────────────────────────────
  # Single-replica baseline coding worker so the gatekeeper has somewhere
  # to route code tasks (and so direct-target `coding_agent` prompts from
  # the TUI dropdown resolve).  The multi-replica peer pool stays available
  # behind the `coding-split` profile below.
  acc-agent-coding-agent:
    image: localhost/acc-agent-core:0.2.0
    container_name: acc-agent-coding-agent
    depends_on:
      nats:
        condition: service_healthy
      acc-redis:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_AGENT_ROLE: coding_agent
      ACC_AGENT_ID: coding-1
      ACC_COLLECTIVE_ID: sol-01
      ACC_NATS_URL: nats://nats:4222
      ACC_LANCEDB_PATH: /app/data/lancedb/coding-1
      ACC_REDIS_URL: redis://acc-redis:6379
      ACC_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # v0.3.40 — PR-MEM2 reflection loop default cadence (10 min).
      # Without this set, _reflection_loop returns immediately and
      # memory_notes stays empty forever (silent since PR-MEM2 shipped
      # in v0.3.1; only became visible after v0.3.37 unblocked the
      # episode-persist producer side).  Set to 0 to disable per service.
      ACC_REFLECTION_INTERVAL_S: ${ACC_REFLECTION_INTERVAL_S:-600}
    volumes:
      - lancedb-data:/app/data/lancedb:U,z
      - acc-packages:/var/lib/acc/packages:U,z
      - ${ACC_WORKSPACE_HOST_DIR:-../../workspaces}:/workspace:z
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
      - ../../roles:/app/roles:ro,z
    networks:
      - acc-net
    restart: unless-stopped

  # ── Agent: Compliance officer (AoA-P2b queue reviewer) ───────────────────
  # Reviews AssistantProposal queue entries (Cat-A approvals, Cat-B/C role
  # mutations).  Gated on the agent.role Literal in acc/config.py including
  # `compliance_officer` — fix shipped alongside this PR.
  acc-agent-compliance-officer:
    image: localhost/acc-agent-core:0.2.0
    container_name: acc-agent-compliance-officer
    depends_on:
      nats:
        condition: service_healthy
      acc-redis:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_AGENT_ROLE: compliance_officer
      ACC_AGENT_ID: compliance-1
      ACC_COLLECTIVE_ID: sol-01
      ACC_NATS_URL: nats://nats:4222
      ACC_LANCEDB_PATH: /app/data/lancedb/compliance-1
      ACC_REDIS_URL: redis://acc-redis:6379
      ACC_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # v0.3.40 — PR-MEM2 reflection loop default cadence (10 min).
      # Without this set, _reflection_loop returns immediately and
      # memory_notes stays empty forever (silent since PR-MEM2 shipped
      # in v0.3.1; only became visible after v0.3.37 unblocked the
      # episode-persist producer side).  Set to 0 to disable per service.
      ACC_REFLECTION_INTERVAL_S: ${ACC_REFLECTION_INTERVAL_S:-600}
    volumes:
      - lancedb-data:/app/data/lancedb:U,z
      - acc-packages:/var/lib/acc/packages:U,z
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
      - ../../roles:/app/roles:ro,z
      - ../../regulatory_layer:/app/regulatory_layer:ro
    networks:
      - acc-net
    restart: unless-stopped

  # ── Coding-split demo: three peer coding_agent workers ───────────────────
  # Profile-gated; only started when --profile coding-split is passed (or
  # via CODING_SPLIT=true ./acc-deploy.sh up).  All three reuse the
  # acc-agent-core image — only ACC_AGENT_ID and ACC_LANCEDB_PATH differ
  # so the arbiter's PlanExecutor can dispatch parallel TASK_ASSIGNs to
  # whichever worker accepts first.
  #
  # Bring-up:
  #   CODING_SPLIT=true ./acc-deploy.sh up
  # Demo:
  #   ./acc-deploy.sh cli plan submit examples/coding_split/plan.json --watch
  acc-coding-1:
    profiles:
      - coding-split
    image: localhost/acc-agent-core:0.2.0
    container_name: acc-coding-1
    depends_on:
      nats:
        condition: service_healthy
      acc-redis:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_AGENT_ROLE: coding_agent
      ACC_AGENT_ID: coding-1
      ACC_COLLECTIVE_ID: sol-01
      ACC_NATS_URL: nats://nats:4222
      ACC_LANCEDB_PATH: /app/data/lancedb/coding-1
      ACC_REDIS_URL: redis://acc-redis:6379
      ACC_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # v0.3.40 — PR-MEM2 reflection loop default cadence (10 min).
      # Without this set, _reflection_loop returns immediately and
      # memory_notes stays empty forever (silent since PR-MEM2 shipped
      # in v0.3.1; only became visible after v0.3.37 unblocked the
      # episode-persist producer side).  Set to 0 to disable per service.
      ACC_REFLECTION_INTERVAL_S: ${ACC_REFLECTION_INTERVAL_S:-600}
    volumes:
      - lancedb-data:/app/data/lancedb:U,z
      - acc-packages:/var/lib/acc/packages:U,z
      # D-007 (PR-U2b) -- trusted workspace, SELinux-labelled (:z).
      - ${ACC_WORKSPACE_HOST_DIR:-../../workspaces}:/workspace:z
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
      - ../../roles:/app/roles:ro,z
    networks:
      - acc-net
    restart: unless-stopped

  acc-coding-2:
    profiles:
      - coding-split
    image: localhost/acc-agent-core:0.2.0
    container_name: acc-coding-2
    depends_on:
      nats:
        condition: service_healthy
      acc-redis:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_AGENT_ROLE: coding_agent
      ACC_AGENT_ID: coding-2
      ACC_COLLECTIVE_ID: sol-01
      ACC_NATS_URL: nats://nats:4222
      ACC_LANCEDB_PATH: /app/data/lancedb/coding-2
      ACC_REDIS_URL: redis://acc-redis:6379
      ACC_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # v0.3.40 — PR-MEM2 reflection loop default cadence (10 min).
      # Without this set, _reflection_loop returns immediately and
      # memory_notes stays empty forever (silent since PR-MEM2 shipped
      # in v0.3.1; only became visible after v0.3.37 unblocked the
      # episode-persist producer side).  Set to 0 to disable per service.
      ACC_REFLECTION_INTERVAL_S: ${ACC_REFLECTION_INTERVAL_S:-600}
    volumes:
      - lancedb-data:/app/data/lancedb:U,z
      - acc-packages:/var/lib/acc/packages:U,z
      # D-007 (PR-U2b) -- trusted workspace, SELinux-labelled (:z).
      - ${ACC_WORKSPACE_HOST_DIR:-../../workspaces}:/workspace:z
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
      - ../../roles:/app/roles:ro,z
    networks:
      - acc-net
    restart: unless-stopped

  acc-coding-3:
    profiles:
      - coding-split
    image: localhost/acc-agent-core:0.2.0
    container_name: acc-coding-3
    depends_on:
      nats:
        condition: service_healthy
      acc-redis:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_AGENT_ROLE: coding_agent
      ACC_AGENT_ID: coding-3
      ACC_COLLECTIVE_ID: sol-01
      ACC_NATS_URL: nats://nats:4222
      ACC_LANCEDB_PATH: /app/data/lancedb/coding-3
      ACC_REDIS_URL: redis://acc-redis:6379
      ACC_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # v0.3.40 — PR-MEM2 reflection loop default cadence (10 min).
      # Without this set, _reflection_loop returns immediately and
      # memory_notes stays empty forever (silent since PR-MEM2 shipped
      # in v0.3.1; only became visible after v0.3.37 unblocked the
      # episode-persist producer side).  Set to 0 to disable per service.
      ACC_REFLECTION_INTERVAL_S: ${ACC_REFLECTION_INTERVAL_S:-600}
    volumes:
      - lancedb-data:/app/data/lancedb:U,z
      - acc-packages:/var/lib/acc/packages:U,z
      # D-007 (PR-U2b) -- trusted workspace, SELinux-labelled (:z).
      - ${ACC_WORKSPACE_HOST_DIR:-../../workspaces}:/workspace:z
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
      - ../../roles:/app/roles:ro,z
    networks:
      - acc-net
    restart: unless-stopped

  # ── CLI (build-only — never run as a long-lived service) ────────────────
  # The acc-cli image is invoked one-shot through the host wrapper
  # `./acc-cli.sh` which calls `podman run --rm`.  Listing it here makes
  # `./acc-deploy.sh build` produce the image alongside the others; the
  # `cli` profile keeps `./acc-deploy.sh up` from trying to start it.
  acc-cli:
    profiles:
      - cli
    build:
      context: ../..
      dockerfile: container/production/Containerfile.cli
      args:
        ACC_VERSION: *acc-version
    image: localhost/acc-cli:0.2.0
    container_name: acc-cli
    # The CLI is one-shot: print help and exit.  Any real invocation goes
    # through `./acc-cli.sh <subcommand>` from the host.
    command: ["--help"]
    networks:
      - acc-net

  # ── Echo MCP server (optional, --profile mcp-echo) ──────────────────────
  # Tiny diagnostic JSON-RPC 2.0 server backing mcps/echo_server/mcp.yaml.
  # stdlib-only Python; ~1 MB image on top of UBI10 python-312-minimal.
  #
  # Enable with: podman-compose --profile mcp-echo up -d
  # Or via host wrapper: MCP_ECHO=true ./acc-deploy.sh up
  #
  # Container name matches the hostname referenced in the manifest's
  # ``url: http://acc-mcp-echo:8080/rpc`` so agents resolve it on the
  # acc-net bridge without manifest edits.  The image is auto-built
  # alongside the others by ``./acc-deploy.sh build`` (compose
  # discovers profile-gated services with build directives).
  acc-mcp-echo:
    profiles:
      - mcp-echo
    build:
      context: ../..
      dockerfile: container/production/Containerfile.echo-mcp-server
      args:
        ACC_VERSION: *acc-version
    image: localhost/acc-mcp-echo:0.2.0
    container_name: acc-mcp-echo
    environment:
      ACC_MCP_ECHO_HOST: "0.0.0.0"
      ACC_MCP_ECHO_PORT: "8080"
      ACC_LOG_LEVEL: INFO
    networks:
      - acc-net
    restart: unless-stopped
    healthcheck:
      # GET / returns a small banner — enough to prove the server is
      # answering before agents start dispatching tool calls to it.
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  # ── Autoresearcher MCPs (optional, --profile acc-autoresearcher) ─────────
  # Three real MCP servers backing the autoresearcher demo
  # (examples/acc_autoresearcher/, ROADMAP E1-E6).  Activated via the
  # AUTORESEARCHER=true env var consumed by acc-deploy.sh.
  #
  # Risk classifications:
  #   - web_search_brave : MEDIUM  (Brave HTTP API; needs BRAVE_API_KEY)
  #   - web_fetch        : MEDIUM  (URL → markdown + paywall flag)
  #   - web_browser_harness : HIGH (Chromium + Playwright + LLM-driven)
  acc-mcp-web-search-brave:
    profiles:
      - acc-autoresearcher
    build:
      context: ../..
      dockerfile: container/production/Containerfile.web-search-brave
      args:
        ACC_VERSION: *acc-version
    image: localhost/acc-mcp-web-search-brave:0.1.0
    container_name: acc-mcp-web-search-brave
    environment:
      BRAVE_API_KEY: "${BRAVE_API_KEY:-}"
      ACC_LOG_LEVEL: INFO
    networks:
      - acc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  acc-mcp-web-fetch:
    profiles:
      - acc-autoresearcher
    build:
      context: ../..
      dockerfile: container/production/Containerfile.web-fetch
      args:
        ACC_VERSION: *acc-version
    image: localhost/acc-mcp-web-fetch:0.1.0
    container_name: acc-mcp-web-fetch
    environment:
      ACC_LOG_LEVEL: INFO
    networks:
      - acc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/',timeout=2).status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  acc-mcp-web-browser-harness:
    profiles:
      - acc-autoresearcher
    build:
      context: ../..
      dockerfile: container/production/Containerfile.web-browser-harness
      args:
        ACC_VERSION: *acc-version
    image: localhost/acc-mcp-web-browser-harness:0.1.0
    container_name: acc-mcp-web-browser-harness
    environment:
      # The harness's LLM client picks one of these credential sets
      # at runtime based on BROWSER_HARNESS_BACKEND.
      ACC_ANTHROPIC_API_KEY: "${ACC_ANTHROPIC_API_KEY:-}"
      ACC_ANTHROPIC_MODEL:   "${ACC_ANTHROPIC_MODEL:-claude-sonnet-4-5}"
      ACC_OPENAI_API_KEY:    "${ACC_OPENAI_API_KEY:-}"
      ACC_OPENAI_BASE_URL:   "${ACC_OPENAI_BASE_URL:-}"
      ACC_OPENAI_MODEL:      "${ACC_OPENAI_MODEL:-gpt-4}"
      BROWSER_HARNESS_BACKEND:  "${BROWSER_HARNESS_BACKEND:-anthropic}"
      BROWSER_HARNESS_HEADLESS: "${BROWSER_HARNESS_HEADLESS:-true}"
      ACC_LOG_LEVEL: INFO
    # Chromium needs more shared memory than the default 64 MB to
    # avoid intermittent crashes mid-navigation.  256 MB is browser-use's
    # documented minimum.
    shm_size: "256m"
    networks:
      - acc-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/',timeout=2).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Browser-harness boot takes longer than the smaller MCPs
      # (Chromium + Playwright initialisation).
      start_period: 30s

  # ── TUI (optional, disabled by default) ──────────────────────────────────
  # Multi-screen operator console (ACC-TUI-Evolution).
  # Enable with: podman-compose --profile tui up -d                (REQ-TUI-045)
  #
  # Multi-collective:  set ACC_COLLECTIVE_IDS=sol-01,sol-02
  # WebBridge:         set ACC_TUI_WEB_PORT=8765 + uncomment port mapping below
  acc-tui:
    profiles:
      - tui
    build:
      context: ../..
      dockerfile: container/production/Containerfile.tui
      args:
        ACC_VERSION: *acc-version
    image: localhost/acc-tui:0.2.0
    container_name: acc-tui
    # PR-S — the userns remap that lets the Configuration screen write
    # back to /app/.env is NOT set here.  ``keep-id`` is incompatible
    # with podman-compose pod mode (``Error: --userns and --pod cannot
    # be set together``), and an empty-string ``userns_mode`` is NOT
    # omitted by podman-compose — it still emits ``--userns``.  Since a
    # compose key can't be conditionally absent via interpolation, the
    # remap lives in an OPT-IN overlay
    # (``container/production/podman-compose.userns.yml``) that
    # ``acc-deploy.sh`` layers on ONLY when ``ACC_TUI_USERNS_MODE`` is
    # set in ./.env.  Non-pod hosts that want the .env-writeback fix
    # (lighthouse) set it; pod-mode hosts (acc1) leave it unset and
    # acc-tui starts clean.
    depends_on:
      nats:
        condition: service_healthy
    # Source the operator's canonical .env so the Configuration screen
    # picks up ACC_LLM_* overrides — agents/webgui have this; acc-tui
    # was missing it and the panel silently showed Pydantic defaults.
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_NATS_URL: nats://nats:4222
      # Multi-collective: comma-separated list of collective IDs (REQ-TUI-006)
      ACC_COLLECTIVE_IDS: sol-01
      # WebBridge HTTP port — 0 = disabled; set to 8765 and enable port below (REQ-TUI-041)
      ACC_TUI_WEB_PORT: "0"
      ACC_ROLES_ROOT: /app/roles
      # File log destination — keeps log lines out of the Textual canvas.
      # Override with ACC_TUI_LOG_DIR; default falls back to ./acc-tui-logs
      # if /app/logs is not writable.
      ACC_TUI_LOG_DIR: /app/logs
      # PR-X/V4 — recreate-on-select workspace with FULL host-fs browsing.
      # ACC_WORKSPACE_HOST_ROOT (default /) is mounted READ-ONLY at /host-fs so
      # the picker can walk the whole host filesystem (Midnight-Commander
      # style) and pick any directory; narrow it (e.g. /home) to restrict reach.
      # ACC_WORKSPACE_BASE is the host path that mount corresponds to — the
      # picker shows host-true paths and the apply request names the real host
      # dir.  ACC_APPLY_DIR is the bind-mounted dir the request lands in.
      ACC_WORKSPACE_BASE: ${ACC_WORKSPACE_HOST_ROOT:-/}
      ACC_WORKSPACE_BROWSE_ROOT: /host-fs
      ACC_APPLY_DIR: /app/.acc-apply
      # PR-Y-2 — writable golden-prompt store (Diagnostics editor +
      # captured executed prompts).  Merged with the shipped suite +
      # any attached watch dirs at load time.
      ACC_GOLDEN_WRITABLE_ROOT: /app/.acc-golden
      # PR-Z1 — governance policy root the Compliance pane browses.
      ACC_REGULATORY_ROOT: /app/regulatory_layer
      # PR-Z2 — imported framework catalogs + gap-analysis report store.
      ACC_FRAMEWORKS_IMPORT_ROOT: /app/.acc-frameworks
      ACC_COMPLIANCE_REPORTS_ROOT: /app/.acc-compliance
    volumes:
      - acc-tui-logs:/app/logs:U,z
      # Mount the host's acc-config.yaml so the Configuration screen
      # reflects the same backend / model / base_url the agent
      # containers actually use.  Without this, the TUI falls back to
      # the image's built-in defaults (typically backend=ollama) and
      # silently misleads the operator about what's running.
      - ../../acc-config.yaml:/app/acc-config.yaml:ro,z
      # Mount the host's .env READ-WRITE so the Configuration screen's
      # Save button can persist operator-tunable LLM knobs.  Only the
      # acc-tui service gets :rw — agents/webgui keep RO env_file
      # access.  See acc/tui/env_writeback.py for the atomic upsert.
      - ../../.env:/app/.env:rw,z
      # PR-C — Agentset tab.  The TUI's collective.yaml editor saves
      # back through `acc.collective.dump_collective`; needs a RW
      # mount on this file.  Apply writes `.acc-apply.request` in the
      # same dir (the repo root) for a host-side watcher to pick up.
      - ../../collective.yaml:/app/collective.yaml:rw,z
      # PR-MM2 -- central model registry, read-only, for the Agentset
      # Model dropdown (acc.models.load_models).
      - ../../models.yaml:/app/models.yaml:ro,z
      # D-007 (PR-U2b) -- trusted workspace mount, SELinux-labelled (:z).
      # The TUI's "Select Directory" modal (WorkspaceSelectModal) browses
      # this shared host dir to let the operator pick / create + trust a
      # per-project working directory.  Same host path the agents mount,
      # so a directory trusted via the TUI is visible to every agent.
      - ${ACC_WORKSPACE_HOST_DIR:-../../workspaces}:/workspace:z
      # PR-X/V4 -- recreate-on-select browse root.  The host root
      # (ACC_WORKSPACE_HOST_ROOT, default /) is mounted READ-ONLY at /host-fs so
      # the picker can browse the whole host filesystem without the container
      # ever writing to it; mkdir + trust + the agent remount all happen
      # host-side via the apply-watcher.  Set ACC_WORKSPACE_HOST_ROOT=/home (or
      # any subtree) to restrict what the TUI can see.
      - ${ACC_WORKSPACE_HOST_ROOT:-/}:/host-fs:ro
      # PR-X -- apply-request channel.  The TUI writes the chosen host
      # path here; the host-side acc-apply-watcher reads it and recreates
      # the agents onto that directory.  rw so the TUI can write.
      - ../../.acc-apply:/app/.acc-apply:rw,z
      # PR-Y-2 -- writable golden-prompt store (named volume, :U so the
      # uid-1001 TUI can write without a host-uid mismatch).
      - acc-golden-data:/app/.acc-golden:U,z
      # PR-Z1 -- governance policy files (read-only) so the Compliance
      # pane can show + browse the loaded Cat-A/B/C rules.
      - ../../regulatory_layer:/app/regulatory_layer:ro
      # PR-Z2 -- writable stores for imported framework catalogs + the
      # generated gap-analysis audit reports (named volumes, :U).
      - acc-frameworks-data:/app/.acc-frameworks:U,z
      - acc-compliance-data:/app/.acc-compliance:U,z
    # Uncomment when WebBridge is enabled (ACC_TUI_WEB_PORT=8765):
    # ports:
    #   - "8765:8765"
    networks:
      - acc-net
    # stdin_open + tty required for interactive terminal access (REQ-TUI-049)
    stdin_open: true
    tty: true

  # ── acc-webgui (optional web frontend — proposal acc-webgui) ────────────
  # FastAPI + React frontend with feature parity to acc-tui plus the
  # enhanced tracing views.  Optional, profile-gated:
  #   podman-compose --profile webgui up -d
  #
  # AUTH: a network-exposed UI must authenticate.  This sample uses the
  # token tier — set ACC_WEBGUI_OPERATOR_TOKEN / _VIEWER_TOKEN (e.g. via
  # the repo-root .env).  Without an auth mode the server refuses a non-loopback
  # bind.  On OpenShift, front it with an oauth-proxy sidecar instead.
  acc-webgui:
    profiles:
      - webgui
    build:
      context: ../..
      dockerfile: container/production/Containerfile.webgui
      args:
        ACC_VERSION: *acc-version
    image: localhost/acc-webgui:0.2.0
    container_name: acc-webgui
    depends_on:
      nats:
        condition: service_healthy
    env_file:
      - path: ../../.env
        required: false
    environment:
      ACC_NATS_URL: nats://nats:4222
      ACC_COLLECTIVE_IDS: sol-01
      ACC_WEBGUI_HOST: 0.0.0.0
      ACC_WEBGUI_PORT: "8080"
      # Interpolation falls back to "token" when the operator's .env
      # doesn't set the mode.  A hard-coded `token` here would override
      # whatever the env_file: above provides — that's why we use ${...}.
      ACC_WEBGUI_AUTH_MODE: ${ACC_WEBGUI_AUTH_MODE:-token}
      ACC_WEBGUI_OPERATOR_TOKEN: ${ACC_WEBGUI_OPERATOR_TOKEN:-}
      ACC_WEBGUI_VIEWER_TOKEN: ${ACC_WEBGUI_VIEWER_TOKEN:-}
      # htpasswd mode — these are honoured only when AUTH_MODE=htpasswd.
      ACC_WEBGUI_HTPASSWD_PATH: ${ACC_WEBGUI_HTPASSWD_PATH:-/app/acc-webgui.htpasswd}
      ACC_WEBGUI_SESSION_SECRET: ${ACC_WEBGUI_SESSION_SECRET:-}
      ACC_WEBGUI_SESSION_TTL: ${ACC_WEBGUI_SESSION_TTL:-43200}
      ACC_WEBGUI_OPERATOR_USERS: ${ACC_WEBGUI_OPERATOR_USERS:-}
      # PR-W — governance/compliance/diagnostics/models parity reads
      # (same roots the TUI uses; shared named volumes so proposals +
      # gap reports are visible from both surfaces).
      ACC_REGULATORY_ROOT: /app/regulatory_layer
      ACC_MODELS_PATH: /app/models.yaml
      ACC_FRAMEWORKS_IMPORT_ROOT: /app/.acc-frameworks
      ACC_COMPLIANCE_REPORTS_ROOT: /app/.acc-compliance
    volumes:
      # htpasswd mode — bind the bcrypt password file in at the
      # default container path.  `required: false` semantics: when the
      # file is absent on the host, podman still tries to mount it and
      # the bind fails; the safe workaround is to keep an empty
      # placeholder at the repo root (or just don't use htpasswd mode).
      - ../../acc-webgui.htpasswd:/app/acc-webgui.htpasswd:ro,z
      # PR-W — governance parity: the policy files + model registry
      # (read-only) and the writable stores shared with acc-tui.
      - ../../regulatory_layer:/app/regulatory_layer:ro
      - ../../models.yaml:/app/models.yaml:ro,z
      - acc-frameworks-data:/app/.acc-frameworks:U,z
      - acc-compliance-data:/app/.acc-compliance:U,z
    ports:
      - "8080:8080"
    networks:
      - acc-net
    restart: unless-stopped
