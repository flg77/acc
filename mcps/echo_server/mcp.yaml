# mcps/echo_server/mcp.yaml — diagnostic MCP manifest.
#
# Points at the JSON-RPC echo server packaged in
# container/production/Containerfile.echo-mcp-server.  When the
# `mcp-echo` compose profile is active (MCP_ECHO=true ./acc-deploy.sh up
# or `podman-compose --profile mcp-echo up -d`), the agent resolves
# this manifest's URL to a live container on the acc-net bridge and
# can dispatch [MCP: echo_server.echo {"text": "..."}] markers to it.
#
# When the profile is NOT active, the manifest still:
#   * Round-trips through the loader / validator (continuous coverage
#     for the registry code paths).
#   * Gives the TUI Ecosystem screen (Phase 4.4) one row to render so
#     the MCP SERVERS panel is never empty on a fresh checkout.
#   * Documents the canonical "happy path" manifest shape for
#     first-time MCP integration contributors.
#
# Manual smoke test:
#   MCP_ECHO=true ./acc-deploy.sh up
#   podman exec -it acc-cli acc-cli nats sub 'acc.sol-01.>' &
#   # ... in another terminal, send a prompt that yields
#   # [MCP: echo_server.echo {"text": "hello"}] in the LLM response
#   # → watch the response carry { "content": [{"type": "text", "text": "hello"}] }

purpose:        "Smoke-test MCP server: round-trip a single 'echo' tool."
version:        "0.1.0"

transport:      "http"
url:            "http://acc-mcp-echo:8080/rpc"
timeout_s:      10
api_key_env:    ""

allowed_tools:
  - "echo"

requires_actions: []
risk_level:     "LOW"
domain_id:      "diagnostic"
tags:           ["test", "diagnostic"]

description: |
  Trivial diagnostic MCP server.  Exists primarily to:

  * Keep the registry/loader code path under continuous test even
    when no production MCP server is configured.
  * Demonstrate a minimal correct manifest for first-time contributors.

  The server is not yet packaged; treat the manifest as a fixture
  until the matching container lands in a future PR.
