                      bundleServerImage:
                        default: openpolicyagent/opa:latest
                        description: BundleServerImage is the OPA bundle server image.
                        type: string
                      pollIntervalSeconds:
                        default: 30
                        description: PollIntervalSeconds controls how often agent
                          OPA sidecars poll the bundle server.
                        format: int32
                        maximum: 300
                        minimum: 10
                        type: integer
                    type: object
                  categoryC:
                    description: CategoryC configures adaptive rule generation by
                      the arbiter.
                    properties:
                      confidenceThreshold:
                        description: |-
                          ConfidenceThreshold is the minimum ICL confidence an arbiter must have
                          before signing a Category C rule. Expressed as a decimal string, e.g. "0.80".
                        pattern: ^0\.[0-9]+$|^1\.0+$
                        type: string
                      maxRulesPerCollective:
                        default: 100
                        description: MaxRulesPerCollective caps the number of active
                          Cat-C rules.
                        format: int32
                        maximum: 1000
                        minimum: 1
                        type: integer
                    type: object
                  gatekeeperIntegration:
                    default: false
                    description: |-
                      GatekeeperIntegration enables syncing Category A rules as OPA Gatekeeper
