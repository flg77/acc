                description: Governance configures the 3-tier rule system.
                properties:
                  categoryA:
                    description: CategoryA configures immutable constitutional rule
                      enforcement.
                    properties:
                      wasmConfigMapRef:
                        description: |-
                          WASMConfigMapRef names the ConfigMap holding the compiled
                          category_a.wasm blob to mount into each agent pod.
