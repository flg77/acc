---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: agentcorpora.acc.redhat.io
spec:
  group: acc.redhat.io
  names:
    categories:
    - acc
    kind: AgentCorpus
    listKind: AgentCorpusList
    plural: agentcorpora
    shortNames:
    - ac
    singular: agentcorpus
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.deployMode
      name: Mode
      type: string
    - jsonPath: .spec.version
      name: Version
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AgentCorpus is the primary resource representing a full ACC deployment.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: AgentCorpusSpec defines the desired state of an ACC deployment.
            properties:
              collectives:
                description: Collectives lists references to AgentCollective resources this corpus manages.
                items:
                  properties:
                    name:
                      maxLength: 63
                      minLength: 1
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 32
                minItems: 1
                type: array
              deployMode:
                default: standalone
                description: DeployMode selects the infrastructure profile.
                enum:
                - standalone
                - rhoai
                type: string
              governance:
                description: Governance configures the 3-tier rule system.
                properties:
                  categoryA:
                    properties:
                      wasmConfigMapRef:
                        minLength: 1
                        type: string
                    required:
                    - wasmConfigMapRef
                    type: object
                  categoryB:
                    properties:
                      bundlePVCSize:
                        default: 500Mi
                        type: string
                      bundleServerImage:
                        default: openpolicyagent/opa:latest
                        type: string
                      pollIntervalSeconds:
                        default: 30
                        maximum: 300
                        minimum: 10
                        type: integer
                        format: int32
                    type: object
                  categoryC:
                    properties:
                      confidenceThreshold:
                        pattern: ^0\.[0-9]+$|^1\.0+$
                        type: string
                      maxRulesPerCollective:
                        default: 100
                        maximum: 1000
                        minimum: 1
                        type: integer
                        format: int32
                    type: object
                  gatekeeperIntegration:
                    default: false
                    type: boolean
                required:
                - categoryA
                - categoryB
                - gatekeeperIntegration
                type: object
              imageRegistry:
                default: registry.access.redhat.com
                type: string
              infrastructure:
                description: Infrastructure configures the shared backing services.
                properties:
                  milvus:
                    properties:
                      collectionPrefix:
                        default: acc_
                        type: string
                      uri:
                        minLength: 1
                        type: string
                      credentialsSecretRef:
                        properties:
                          name:
                            type: string
                          namespace:
                            type: string
                        type: object
                    required:
                    - uri
                    type: object
                  nats:
                    properties:
                      replicas:
                        default: 1
                        format: int32
                        maximum: 5
                        minimum: 1
                        type: integer
                      resources:
                        description: ResourceRequirements describes the compute resource requirements.
                        properties:
                          limits:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            type: object
                          requests:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            type: object
                        type: object
                      storageClass:
                        type: string
                      storageSize:
                        default: 2Gi
                        type: string
                      version:
                        default: "2.10"
                        pattern: ^[0-9]+\.[0-9]+.*$
                        type: string
                    required:
                    - version
                    - replicas
                    type: object
                  redis:
                    properties:
                      replicas:
                        default: 1
                        format: int32
                        maximum: 6
                        minimum: 1
                        type: integer
                      resources:
                        description: ResourceRequirements describes the compute resource requirements.
                        properties:
                          limits:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            type: object
                          requests:
                            additionalProperties:
                              anyOf:
                              - type: integer
                              - type: string
                              pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                              x-kubernetes-int-or-string: true
                            type: object
                        type: object
                      storageSize:
                        default: 1Gi
                        type: string
                      version:
                        default: "6"
                        type: string
                    required:
                    - version
                    - replicas
                    type: object
                required:
                - nats
                - redis
                type: object
              kafka:
                properties:
                  auditTopic:
                    default: acc.audit.all
                    type: string
                  bootstrapServers:
                    minLength: 1
                    type: string
                  bridgeReplicas:
                    default: 1
                    format: int32
                    maximum: 10
                    minimum: 1
                    type: integer
                  credentialsSecretRef:
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    type: object
                  signalTopicsPrefix:
                    default: acc.signals
                    type: string
                required:
                - bootstrapServers
                type: object
              observability:
                properties:
                  backend:
                    default: log
                    enum:
                    - log
                    - otel
                    type: string
                  grafanaDashboard:
                    default: false
                    type: boolean
                  otelCollector:
                    properties:
                      endpoint:
                        minLength: 1
                        type: string
                      serviceName:
                        default: acc-agent
                        type: string
                      tlsInsecure:
                        default: false
                        type: boolean
                    required:
                    - endpoint
                    type: object
                  prometheusRules:
                    default: true
                    type: boolean
                required:
                - backend
                type: object
              upgradePolicy:
                properties:
                  minKafkaVersion:
                    type: string
                  mode:
                    default: auto
                    enum:
                    - auto
                    - manual
                    type: string
                  requireApproval:
                    default: false
                    type: boolean
                required:
                - mode
                type: object
              version:
                default: 0.1.0
                pattern: ^v?[0-9]+\.[0-9]+\.[0-9]+.*$
                type: string
            required:
            - collectives
            - deployMode
            - governance
            - infrastructure
            - version
            type: object
          status:
            description: AgentCorpusStatus reports the observed state of the full ACC deployment.
            properties:
              collectiveStatuses:
                additionalProperties:
                  properties:
                    conditions:
                      items:
                        properties:
                          lastTransitionTime:
                            format: date-time
                            type: string
                          message:
                            type: string
                          observedGeneration:
                            format: int64
                            type: integer
                          reason:
                            type: string
                          status:
                            type: string
                          type:
                            type: string
                        required:
                        - lastTransitionTime
                        - message
                        - reason
                        - status
                        - type
                        type: object
                      type: array
                      x-kubernetes-list-map-keys:
                      - type
                      x-kubernetes-list-type: map
                    desiredAgents:
                      additionalProperties:
                        format: int32
                        type: integer
                      type: object
                    kserveReady:
                      type: boolean
                    phase:
                      type: string
                    readyAgents:
                      additionalProperties:
                        format: int32
                        type: integer
                      type: object
                    scaledObjectsActive:
                      type: boolean
                  type: object
                type: object
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              currentVersion:
                type: string
              infrastructure:
                properties:
                  milvusConnected:
                    type: boolean
                  natsReady:
                    type: boolean
                  natsVersion:
                    type: string
                  opaBundleReady:
                    type: boolean
                  otelCollectorReady:
                    type: boolean
                  redisReady:
                    type: boolean
                  redisVersion:
                    type: string
                type: object
              kafkaBridgeReady:
                type: boolean
              observedGeneration:
                format: int64
                type: integer
              pendingUpgradeVersion:
                type: string
              phase:
                description: CorpusPhase represents the top-level operational phase.
                type: string
              prerequisites:
                properties:
                  allMet:
                    type: boolean
                  gatekeeperInstalled:
                    type: boolean
                  kafkaReachable:
                    type: boolean
                  kedaInstalled:
                    type: boolean
                  kserveInstalled:
                    type: boolean
                  prometheusRulesSupported:
                    type: boolean
                  rhoaiInstalled:
                    type: boolean
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
