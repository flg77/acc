---
# Sample AgentCorpus — runtime-evidence Cat-A enabled (proposal 015, Phase 3).
#
# Demonstrates the opt-in, provider-agnostic kernel-event evidence
# layer.  The governance.runtimeEvidence block is the only addition
# versus a plain rhoai corpus.
#
# Recommended rollout: start with enforce=false (the observe baseline)
# on a canary collective, tune the binary allowlist from the observe
# log, then flip enforce=true.  See docs/runtime-evidence.md.
apiVersion: acc.redhat.io/v1alpha1
kind: AgentCorpus
metadata:
  name: runtime-evidence-corpus
  namespace: acc-system
spec:
  deployMode: rhoai
  version: "0.1.0"
  imageRegistry: registry.access.redhat.com

  collectives:
    - name: runtime-evidence-collective-01

  infrastructure:
    nats:
      version: "2.10"
      replicas: 3
      storageSize: 10Gi
    redis:
      version: "6"
      replicas: 3
      storageSize: 5Gi
    milvus:
      uri: "http://milvus.milvus-system.svc.cluster.local:19530"
      collectionPrefix: "acc_"

  governance:
    categoryA:
      wasmConfigMapRef: acc-cat-a-wasm
    categoryB:
      pollIntervalSeconds: 30
    gatekeeperIntegration: false

    # --- Phase 3: runtime-evidence Cat-A (proposal 015) -------------------
    runtimeEvidence:
      enabled: true            # opt-in master switch
      enforce: false           # observe baseline; flip true after tuning
      observeWindowDays: 28
      preferredBackend: auto   # auto = RHACS > Falco > Tetragon
