# ACC web GUI — optional Kubernetes Deployment + Service (+ OpenShift Route).
#
# Deploys acc-webgui — the FastAPI + React web frontend — alongside a
# collective.  Feature parity with acc-tui plus the enhanced tracing
# views (proposal acc-webgui).
#
# Usage:
#   kubectl apply -f operator/config/samples/acc_webgui_deployment.yaml
#
# AUTHENTICATION (mandatory — this is a network-exposed human surface):
#   * dev / generic Kubernetes — ACC_WEBGUI_AUTH_MODE=token, or
#     =htpasswd (multi-user; mount a bcrypt htpasswd file + set
#     ACC_WEBGUI_HTPASSWD_PATH and ACC_WEBGUI_SESSION_SECRET), or
#     =oidc with ACC_WEBGUI_OIDC_ISSUER.
#   * edge — ACC_WEBGUI_AUTH_MODE=mtls: front the pod with the nginx
#     mTLS sidecar (container/production/nginx-mtls-sidecar.conf), or
#     have the MicroShift router do re-encrypt + client-cert
#     verification.  See the commented mTLS block at the end of this
#     file.
#   * OpenShift — set ACC_WEBGUI_AUTH_MODE=oauth-proxy and front the
#     Service with an oauth-proxy sidecar + the Route below for SSO.
# Without an auth mode acc-webgui refuses a non-loopback bind.
#
# Prerequisites:
#   - the acc-config ConfigMap for the target collective
#   - NATS reachable at nats:4222 in the namespace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acc-webgui
  namespace: acc-corpus            # adjust to your namespace
  labels:
    app.kubernetes.io/name: acc-webgui
    app.kubernetes.io/component: webgui
    app.kubernetes.io/part-of: agentic-cell-corpus
    app.kubernetes.io/version: "0.1.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: acc-webgui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acc-webgui
        app.kubernetes.io/component: webgui
        app.kubernetes.io/part-of: agentic-cell-corpus
        app.kubernetes.io/version: "0.1.0"
    spec:
      # OCP restricted SCC — run as non-root UID 1001
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: acc-webgui
          image: registry.access.redhat.com/acc/acc-webgui:0.1.0  # replace with your registry
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ACC_NATS_URL
              valueFrom:
                configMapKeyRef:
                  name: sol-01-acc-config   # adjust: {collective}-acc-config
                  key: nats_url
                  optional: true
            - name: ACC_COLLECTIVE_IDS
              value: sol-01
            - name: ACC_WEBGUI_HOST
              value: "0.0.0.0"
            - name: ACC_WEBGUI_PORT
              value: "8080"
            # --- auth (edit per deploy mode — see the header) ---
            - name: ACC_WEBGUI_AUTH_MODE
              value: "token"            # token | htpasswd | oidc | mtls | oauth-proxy
            - name: ACC_WEBGUI_OPERATOR_TOKEN
              valueFrom:
                secretKeyRef:
                  name: acc-webgui-auth
                  key: operator_token
                  optional: true
            - name: ACC_WEBGUI_VIEWER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: acc-webgui-auth
                  key: viewer_token
                  optional: true
            # htpasswd mode — also mount the htpasswd file (volume below)
            # and uncomment:
            # - name: ACC_WEBGUI_HTPASSWD_PATH
            #   value: /etc/acc-webgui/htpasswd
            # - name: ACC_WEBGUI_SESSION_SECRET
            #   valueFrom:
            #     secretKeyRef: { name: acc-webgui-auth, key: session_secret }
            # - name: ACC_WEBGUI_OPERATOR_USERS
            #   value: "alice,bob"      # htpasswd users granted the operator role
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      restartPolicy: Always
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: acc-webgui
  namespace: acc-corpus
  labels:
    app.kubernetes.io/name: acc-webgui
spec:
  selector:
    app.kubernetes.io/name: acc-webgui
  ports:
    - name: http
      port: 8080
      targetPort: http
---
# OpenShift Route — uncomment on rhoai.  For SSO, add an oauth-proxy
# sidecar to the Deployment and point the Route at the proxy port.
# apiVersion: route.openshift.io/v1
# kind: Route
# metadata:
#   name: acc-webgui
#   namespace: acc-corpus
# spec:
#   to:
#     kind: Service
#     name: acc-webgui
#   port:
#     targetPort: http
#   tls:
#     termination: edge
#
# ---------------------------------------------------------------------------
# EDGE — mtls mode.  Add an nginx mTLS sidecar to the Deployment above:
# it terminates TLS on :8443, verifies the client certificate against a
# local CA, and injects the verified subject as a header acc-webgui
# trusts.  acc-webgui itself must then bind 127.0.0.1 (set
# ACC_WEBGUI_HOST=127.0.0.1 and ACC_WEBGUI_AUTH_MODE=mtls) so it is
# reachable ONLY through the sidecar.
#
# Add to spec.template.spec.containers:
#   - name: mtls-sidecar
#     image: docker.io/library/nginx:stable
#     ports: [{ name: https, containerPort: 8443 }]
#     volumeMounts:
#       - { name: nginx-conf, mountPath: /etc/nginx/nginx.conf, subPath: nginx.conf, readOnly: true }
#       - { name: webgui-tls, mountPath: /etc/nginx/tls, readOnly: true }
# Add to spec.template.spec.volumes:
#   - name: nginx-conf            # ConfigMap from nginx-mtls-sidecar.conf
#     configMap: { name: acc-webgui-mtls-nginx }
#   - name: webgui-tls            # server.crt/key + client-ca.crt
#     secret: { secretName: acc-webgui-tls }
# And point the Service port at the sidecar (port 8443, name https).
# On a MicroShift cluster the router can do re-encrypt + client-cert
# verification instead, injecting the same headers — no sidecar needed.
