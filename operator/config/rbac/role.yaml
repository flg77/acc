---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: acc-operator-manager-role
rules:
# ACC CRDs
- apiGroups: ["acc.redhat.io"]
  resources: ["agentcorpora", "agentcollectives"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["acc.redhat.io"]
  resources: ["agentcorpora/status", "agentcollectives/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["acc.redhat.io"]
  resources: ["agentcorpora/finalizers", "agentcollectives/finalizers"]
  verbs: ["update"]
# Stage 1.6b — AccCatalog + AccPackageInstall
- apiGroups: ["acc.redhat.io"]
  resources: ["acccatalogs", "accpackageinstalls"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["acc.redhat.io"]
  resources: ["acccatalogs/status", "accpackageinstalls/status"]
  verbs: ["get", "update", "patch"]
# Stage 1.6b — pod exec for acc-cli collective pkg-install-direct
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
# Core Kubernetes
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# DaemonSets — read-only, for Falco runtime-backend detection (proposal 015)
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services", "configmaps", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# OpenShift Route for the acc-webgui oauth2-proxy front (proposal 031 §11 #2)
- apiGroups: ["route.openshift.io"]
  resources: ["routes"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create"]
# RHOAI project association + dashboard tile/quickstarts (operator 0.1.4).
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "patch"]
- apiGroups: ["dashboard.opendatahub.io"]
  resources: ["odhapplications"]
  verbs: ["get", "list", "create", "update"]
- apiGroups: ["console.openshift.io"]
  resources: ["odhquickstarts"]
  verbs: ["get", "list", "create", "update"]
# Leader election (controller-runtime --leader-elect uses a Lease).
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# RHOAI detection (webhook defaults deployMode=rhoai when a DataScienceCluster
# exists) + model discovery reads KServe InferenceServices (granted above).
- apiGroups: ["datasciencecluster.opendatahub.io"]
  resources: ["datascienceclusters"]
  verbs: ["get", "list", "watch"]
# AccCatalog + AccPackageInstall (Stage 1.6 CRDs) + the pkg-install exec path.
- apiGroups: ["acc.redhat.io"]
  resources: ["acccatalogs", "accpackageinstalls"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["acc.redhat.io"]
  resources: ["acccatalogs/status", "accpackageinstalls/status"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["acc.redhat.io"]
  resources: ["acccatalogs/finalizers", "accpackageinstalls/finalizers"]
  verbs: ["update"]
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "watch", "create"]
# Network policy (proposal 014) — standard NetworkPolicy + the optional
# FQDN/L7 backends (EgressFirewall on OVN-Kubernetes, CiliumNetworkPolicy).
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["k8s.ovn.org"]
  resources: ["egressfirewalls"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["cilium.io"]
  resources: ["ciliumnetworkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# OPA Gatekeeper ConstraintTemplates (cluster-scoped)
- apiGroups: ["templates.gatekeeper.sh"]
  resources: ["constrainttemplates"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# KEDA
- apiGroups: ["keda.sh"]
  resources: ["scaledobjects"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# KServe
- apiGroups: ["serving.kserve.io"]
  resources: ["inferenceservices"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Prometheus Operator
- apiGroups: ["monitoring.coreos.com"]
  resources: ["prometheusrules"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# SPIRE (spire-controller-manager) — proposal 011 PR-2
- apiGroups: ["spire.spiffe.io"]
  resources: ["clusterspiffeids", "clusterfederatedtrustdomains"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# API discovery (for prerequisite detection)
- nonResourceURLs: ["/healthz", "/readyz", "/livez"]
  verbs: ["get"]
