                required:
                - backend
                type: object
              roleDefinition:
                description: |-
                  RoleDefinition sets the cognitive role for all agents in this collective.
                  The reconciler renders this into a ConfigMap named acc-role-{collectiveId}
                  mounted read-only into every agent pod at /app/acc-role.yaml.
                  Agents load this as the highest-priority role source on startup.
                properties:
                  allowedActions:
                    description: AllowedActions lists the actions the agent may perform.
                    items:
                      type: string
                    type: array
                  categoryBOverrides:
                    additionalProperties:
                      type: string
                    description: |-
                      CategoryBOverrides are live-updatable Cat-B governance setpoints
                      (e.g. token_budget, rate_limit_rpm).
                    type: object
                  persona:
                    default: concise
                    description: Persona controls the LLM response style.
                    enum:
                    - concise
                    - formal
                    - exploratory
                    - analytical
                    type: string
                  purpose:
                    description: |-
                      Purpose is the agent's primary objective statement, injected as the
                      first component of the CognitiveCore system prompt.
                    type: string
                  seedContext:
                    description: SeedContext is a domain-specific priming string injected
                      into every LLM call.
                    type: string
                  taskTypes:
                    description: TaskTypes lists the NATS signal types this agent
                      will accept.
                    items:
                      type: string
                    type: array
                  version:
                    default: 0.1.0
                    description: Version is the semantic version of this role definition.
                    type: string
                type: object
              scaling:
                description: |-
                  Scaling configures KEDA-based autoscaling per role.
                  Requires KEDA to be installed cluster-wide (operator checks via API discovery).
                properties:
                  enabled:
                    default: false
                    description: |-
                      Enabled activates KEDA ScaledObjects for all roles in this collective.
                      Requires KEDA to be installed cluster-wide.
                    type: boolean
                  roleScaling:
                    description: RoleScaling allows per-role scaling overrides.
                    items:
                      description: RoleScalingSpec configures KEDA scaling for a single
                        agent role.
                      properties:
                        healthMetricThreshold:
                          default: 70
                          description: |-
                            HealthMetricThreshold scales down when the role's average health_score
                            drops below this value (percentage 0-100).
                          format: int32
                          maximum: 100
                          minimum: 0
                          type: integer
                        maxReplicas:
                          default: 10
                          description: MaxReplicas is the KEDA maximum replica count.
                          format: int32
                          minimum: 1
                          type: integer
                        minReplicas:
                          default: 1
                          description: MinReplicas is the KEDA minimum replica count.
                          format: int32
                          minimum: 0
                          type: integer
                        natsConsumerLagThreshold:
                          default: 10
                          description: NATSConsumerLagThreshold scales up when NATS
                            consumer lag exceeds this value.
                          format: int64
                          minimum: 1
                          type: integer
                        role:
                          description: |-
                            Role identifies which agent role this scaling config applies to.
                            Validation: regex on the AgentRole type + webhook catalogue check.
                          maxLength: 63
                          minLength: 2
                          pattern: ^[a-z][a-z0-9_]{1,62}$
                          type: string
                      required:
                      - role
                      type: object
                    type: array
                required:
                - enabled
                type: object
              spiffe:
                description: |-
                  Spiffe configures SPIFFE workload identity for this collective
                  (proposal 011).  When enabled, the operator issues a matching
                  ClusterSPIFFEID custom resource so spire-controller-manager
                  attests the collective's agent pods.  Omitted / disabled keeps
                  the legacy Ed25519 trust model.
                properties:
                  edgeSiteID:
                    description: |-
                      EdgeSiteID qualifies the SPIFFE path so multiple edge sites
                      under a shared trust domain can never collide
                      (spiffe://<td>/edge/<site-id>/role/<id>).  Required when
                      deployMode=edge and edgeTopology=nested; ignored otherwise.
                    type: string
                  edgeTopology:
                    default: nested
                    description: |-
                      EdgeTopology selects the edge SPIRE deployment topology
                      (proposal 012).  Only consulted when the owning AgentCorpus
                      has deployMode=edge.
                        nested    — edge SPIRE server downstream of an rhoai parent;
                                    identities are site-qualified
                                    (spiffe://<td>/edge/<site>/role/<id>).
                        federated — edge SPIRE owns its trust domain, federated with
                                    peers; no site-qualifier (the trust domain IS the
                                    scope).
                        ed25519   — no edge SPIRE; legacy trust model.
                    enum:
                    - nested
                    - federated
                    - ed25519
                    type: string
                  enabled:
                    default: false
                    description: |-
                      Enabled is the master switch.  When false the operator issues
                      no ClusterSPIFFEID and the collective keeps the Ed25519 model.
                    type: boolean
                  federationPeers:
                    description: |-
                      FederationPeers lists SPIFFE bundle-endpoint URLs to federate
                      with (proposal 012 PR-3).  Required (>= 1 entry) when
                      edgeTopology=federated — each peer becomes a
                      ClusterFederatedTrustDomain custom resource so this edge's
                      SPIRE trusts SVIDs issued by the peer's trust domain.  Ignored
                      for nested / ed25519 topologies.
                    items:
                      type: string
                    type: array
                  trustDomain:
                    description: |-
                      TrustDomain is the SPIFFE trust domain, e.g. acc-prod.example.com.
                      Empty means the operator derives <corpus-name>.acc.local.
                    type: string
                type: object
            required:
            - agents
            - collectiveId
            - corpusRef
            - llm
            type: object
          status:
            description: AgentCollectiveStatus reports the observed state of one collective.
            properties:
              conditions:
                description: Conditions contains the condition set for this collective.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              desiredAgents:
                additionalProperties:
                  format: int32
                  type: integer
                description: DesiredAgents maps role → desired replica count.
                type: object
              edgeSiteID:
                description: |-
                  EdgeSiteID echoes the site qualifier baked into SpiffeID when
                  the collective runs under deployMode=edge with edgeTopology=
                  nested (proposal 012 PR-2).  Empty for non-edge / non-nested.
                type: string
              kserveReady:
                description: KServeReady is true when the InferenceService is in ready
                  state.
                type: boolean
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  reflects.
                format: int64
                type: integer
              phase:
                description: Phase is the collective's operational state.
                enum:
                - Pending
                - Progressing
                - Ready
                - Degraded
                type: string
              readyAgents:
                additionalProperties:
                  format: int32
                  type: integer
                description: ReadyAgents maps role → number of ready pods.
                type: object
              scaledObjectsActive:
                description: ScaledObjectsActive is true when KEDA ScaledObjects are
                  in effect.
                type: boolean
              spiffeError:
                description: |-
                  SpiffeError carries an operator-readable reason when SPIFFE
                  provisioning could not complete (e.g. SPIRE not installed).
                  Empty on success or when spiffe is disabled.
                type: string
              spiffeID:
                description: |-
                  SpiffeID is the workload identity the operator computed for this
                  collective, e.g. spiffe://acc-prod.example.com/role/research.
