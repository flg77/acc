---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: accpackageinstalls.acc.redhat.io
spec:
  group: acc.redhat.io
  names:
    kind: AccPackageInstall
    listKind: AccPackageInstallList
    plural: accpackageinstalls
    shortNames:
    - accpkginstall
    singular: accpackageinstall
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.name
      name: Package
      type: string
    - jsonPath: .spec.constraint
      name: Constraint
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.installedVersion
      name: Installed
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AccPackageInstall is the Schema for the accpackageinstalls API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AccPackageInstallSpec declares a single @scope/name@constraint
              package to be installed in this namespace's ACC pods (Stage 1.6).

              The reconciler periodically:

               1. Picks an AccCorpus / AccCollective pod in the namespace.
               2. Exec's `acc-cli collective pkg-install ... --json` against a
                  synthesised collective.yaml whose required_packages: list
                  mirrors the active AccPackageInstall resources.
               3. Records status (installed/failed/missing) on the CR.

              This is the GitOps seam for Stage 1.5.3's pkg-install code path:
              ArgoCD or Flux drops AccPackageInstall objects into the cluster
              and the operator reconciles them onto live ACC pods.
            properties:
              allowUnsigned:
                default: false
                description: |-
                  AllowUnsigned bypasses the catalog's cosign signing floor for
                  THIS install only. Operator-explicit and audit-logged — leave
                  false (the default) in production; set true only for local or
                  unsigned development packages.
                type: boolean
              catalogRef:
                description: |-
                  CatalogRef optionally pins the catalogId of the AccCatalog this
                  package must come from (for example "acc-canonical"). Leave
                  empty to let the layered resolver pick the highest-priority
                  catalog that provides the package.
                type: string
              constraint:
                description: |-
                  Constraint is the semver range to resolve: an exact version
                  ("0.1.0"), a caret range ("^1.2"), a tilde range ("~1.2.3"), or
                  a bounded range (">=1.2 <2.0"). The acc-pkg installer resolves
                  the highest matching version from the catalog; a version with
                  no match fails the install with EXIT_DEPS. The operator does
                  shape validation via the admission webhook.
                minLength: 1
                type: string
              name:
                description: |-
                  Name is the scoped package to install, in @scope/name form (for
                  example "@acc/capital-markets-roles"). Lowercase; the @scope
                  prefix is mandatory. Resolved against the AccCatalog layers in
                  this namespace (optionally pinned with catalogRef).
                pattern: ^@[a-z0-9][a-z0-9-]*/[a-z0-9][a-z0-9_-]*$
                type: string
              targetCorpus:
                description: |-
                  TargetCorpus optionally names the AgentCorpus whose pods receive
                  this install (for example "finance-demo"). Leave empty to
                  install into every AgentCorpus in this namespace.
                type: string
            required:
            - constraint
            - name
            type: object
          status:
            description: |-
              AccPackageInstallStatus carries observed-state fields populated
              by the controller's reconcile loop.
            properties:
              conditions:
                description: Conditions list the standard Ready / Reconciled conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              contentSha256:
                description: |-
                  ContentSHA256 is the content-tree hash recorded in the
                  registry; lets GitOps tooling detect content drift.
                type: string
              installPath:
                description: InstallPath is the unpacked tree location on the target
                  pod.
                type: string
              installedVersion:
                description: |-
                  InstalledVersion is the exact semver the resolver chose; empty
                  until first successful install.
                type: string
              lastInstalledAt:
                description: |-
                  LastInstalledAt records the most recent successful install
                  (idempotent re-installs update this).
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration matches metadata.generation when the
                  controller last reconciled.
                format: int64
                type: integer
              phase:
                description: Phase is a high-level summary surfaced by `kubectl get`.
                enum:
                - Pending
                - Installing
                - Installed
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
