apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "acc.redhat.io/v1alpha1",
          "kind": "AgentCorpus",
          "metadata": {
            "name": "rhoai-corpus",
            "namespace": "acc-system"
          },
          "spec": {
            "deployMode": "rhoai",
            "version": "0.1.0",
            "imageRepository": "quay.io/flg77/acc_images",
            "imagePullSecrets": ["acc-images-pull"],
            "collectives": [{"name": "rhoai-collective-01"}],
            "infrastructure": {
              "nats": {"version": "2.10", "replicas": 1, "storageSize": "2Gi"},
              "redis": {"version": "6", "replicas": 1, "storageSize": "1Gi"},
              "milvus": {"uri": "milvus-service.milvus.svc.cluster.local:19530"}
            },
            "governance": {
              "categoryA": {"wasmConfigMapRef": "acc-cat-a-wasm"},
              "categoryB": {"pollIntervalSeconds": 30},
              "categoryC": {"confidenceThreshold": "0.80"},
              "gatekeeperIntegration": true,
              "runtimeEvidence": {"enabled": true}
            },
            "rhoai": {"registerNamespaceAsProject": true, "projectDisplayName": "ACC Corpus"},
            "observability": {"backend": "otel", "prometheusRules": true},
            "upgradePolicy": {"mode": "auto"}
          }
        },
        {
          "apiVersion": "acc.redhat.io/v1alpha1",
          "kind": "AgentCollective",
          "metadata": {
            "name": "rhoai-collective-01",
            "namespace": "acc-system"
          },
          "spec": {
            "collectiveId": "rhoai-01",
            "corpusRef": {"name": "rhoai-corpus"},
            "agents": [
              {"role": "assistant", "replicas": 1},
              {"role": "ingester", "replicas": 1},
              {"role": "analyst", "replicas": 1},
              {"role": "synthesizer", "replicas": 1},
              {"role": "arbiter", "replicas": 1},
              {"role": "observer", "replicas": 1}
            ],
            "llm": {
              "backend": "vllm",
              "vllm": {
                "deploy": false,
                "inferenceServiceRef": "llama-31-8b-instruct",
                "model": "llama-31-8b-instruct"
              }
            }
          }
        },
        {
          "apiVersion": "acc.redhat.io/v1alpha1",
          "kind": "AccCatalog",
          "metadata": {
            "name": "acc-canonical",
            "namespace": "acc-system"
          },
          "spec": {
            "catalogId": "acc-canonical",
            "tier": "trusted",
            "mode": "https",
            "url": "https://flg77.github.io/acc-ecosystem",
            "priority": 100,
            "requiredSigner": {
              "issuer": "https://token.actions.githubusercontent.com",
              "subjectPattern": "^https://github.com/flg77/acc-ecosystem/.*"
            }
          }
        },
        {
          "apiVersion": "acc.redhat.io/v1alpha1",
          "kind": "AccPackageInstall",
          "metadata": {
            "name": "workspace-roles",
            "namespace": "acc-system"
          },
          "spec": {
            "name": "@acc/workspace-roles",
            "catalogRef": "acc-canonical"
          }
        }
      ]
    capabilities: Seamless Upgrades
    categories: AI/Machine Learning, Integration & Delivery
    containerImage: quay.io/redhat-ai-dev/acc-operator:0.2.8
    createdAt: "2026-04-15T00:00:00Z"
    operatorframework.io/suggested-namespace: acc-system
    description: >-
      **Community operator — NOT a Red Hat product. It is not provided,
      supported, certified, or endorsed by Red Hat.** The Agentic Cell Corpus
      (ACC) Operator installs and manages the ACC multi-agent governance
      framework on OpenShift 4.14+ and Kubernetes 1.27+. Inspired by biological
      cell architecture, ACC provides a homeostatic three-tier governance system
      (WASM, OPA bundle, ICL-signed) for coordinated AI agent collectives.
    operators.operatorframework.io/builder: operator-sdk-v1.34.0
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
    support: Community (best-effort; no SLA) — NOT supported by Red Hat
  name: acc-operator.v0.2.8
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: >-
        AgentCorpus is the primary resource representing a full ACC deployment.
        It configures the shared infrastructure (NATS, Redis, governance) and
        references the AgentCollective resources it manages.
      displayName: Agent Corpus
      kind: AgentCorpus
      name: agentcorpora.acc.redhat.io
      version: v1alpha1
    - description: >-
        AgentCollective represents a single collective of ACC agents within an
        AgentCorpus. Each collective has its own LLM backend, agent role
        deployments, and optional KEDA-based autoscaling.
      displayName: Agent Collective
      kind: AgentCollective
      name: agentcollectives.acc.redhat.io
      version: v1alpha1
    - description: >-
        AccCatalog declares one layer of the package catalog that ACC pods
        resolve roles, skills, and MCPs from. Each catalog has a trust tier, an
        index source (HTTPS URL or on-disk file), and a required cosign signer
        that forms the install-time signing floor. The operator merges every
        AccCatalog in the namespace into the acc-catalogs ConfigMap.
      displayName: ACC Catalog
      kind: AccCatalog
      name: acccatalogs.acc.redhat.io
      version: v1alpha1
    - description: >-
        AccPackageInstall requests installation of a single @scope/name role
        package (at a semver constraint) into the ACC pods in this namespace. It
        is the GitOps seam for package infusion: the operator resolves it
        against the AccCatalog layers, verifies the signature, installs it onto
        live pods, and records the resolved version and content hash in status.
      displayName: ACC Package Install
      kind: AccPackageInstall
      name: accpackageinstalls.acc.redhat.io
      version: v1alpha1
  description: |
    ## Overview

    The **Agentic Cell Corpus (ACC) Operator** manages a biologically-inspired
    multi-agent AI governance framework on OpenShift and Kubernetes.

    ### Features

    - **Three-tier governance**: Category A (immutable WASM), Category B
      (live-updatable OPA bundles), Category C (arbiter-signed ICL rules)
    - **NATS JetStream** signal bus with persistent storage
    - **Redis** working memory, **LanceDB** (standalone) or **Milvus** (RHOAI)
      vector storage
    - **KEDA autoscaling** per agent role (optional)
    - **KServe InferenceService** for vLLM / Llama Stack backends (RHOAI mode)
    - **OTel + Prometheus** observability
    - **Upgrade approval gate** for infrastructure version changes
    - **OLM Level 3** — Seamless Upgrades with rolling deployments

    ### Prerequisites (optional — graceful degradation when absent)

    - OPA Gatekeeper (for ConstraintTemplate-based admission control)
    - KEDA (for NATS consumer lag autoscaling)
    - RHOAI / OpenShift AI (for vllm/llama_stack LLM backends)
    - Kafka (for NATS→Kafka audit bridge)
    - Prometheus Operator (for PrometheusRule CRs)

    ### Quick Start

    ```yaml
    kubectl apply -f - <<EOF
    apiVersion: acc.redhat.io/v1alpha1
    kind: AgentCorpus
    metadata:
      name: my-corpus
    spec:
      deployMode: standalone
      collectives:
        - name: my-collective
      governance:
        categoryA:
          wasmConfigMapRef: acc-cat-a-wasm
    EOF
    ```

  displayName: Agentic Cell Corpus Operator
  icon:
  - base64data: ""
    mediatype: image/svg+xml
  install:
    spec:
      clusterPermissions:
      - rules:
        - apiGroups: ["acc.redhat.io"]
          resources: ["agentcorpora", "agentcollectives"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["acc.redhat.io"]
          resources: ["agentcorpora/status", "agentcollectives/status"]
          verbs: ["get", "update", "patch"]
        - apiGroups: ["acc.redhat.io"]
          resources: ["agentcorpora/finalizers", "agentcollectives/finalizers"]
          verbs: ["update"]
        - apiGroups: ["acc.redhat.io"]
          resources: ["acccatalogs", "accpackageinstalls"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["acc.redhat.io"]
          resources: ["acccatalogs/status", "accpackageinstalls/status"]
          verbs: ["get", "update", "patch"]
        - apiGroups: ["acc.redhat.io"]
          resources: ["acccatalogs/finalizers", "accpackageinstalls/finalizers"]
          verbs: ["update"]
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["pods/exec"]
          verbs: ["create"]
        - apiGroups: ["apps"]
          resources: ["deployments", "statefulsets", "daemonsets"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: [""]
          resources: ["services", "configmaps", "persistentvolumeclaims", "events"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: [""]
          resources: ["secrets"]
          verbs: ["get", "list", "watch"]
        - apiGroups: [""]
          resources: ["namespaces"]
          verbs: ["get", "patch"]
        - apiGroups: ["dashboard.opendatahub.io"]
          resources: ["odhapplications"]
          verbs: ["get", "list", "create", "update"]
        - apiGroups: ["console.openshift.io"]
          resources: ["odhquickstarts"]
          verbs: ["get", "list", "create", "update"]
        - apiGroups: ["coordination.k8s.io"]
          resources: ["leases"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["datasciencecluster.opendatahub.io"]
          resources: ["datascienceclusters"]
          verbs: ["get", "list", "watch"]
        - apiGroups: ["templates.gatekeeper.sh"]
          resources: ["constrainttemplates"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["keda.sh"]
          resources: ["scaledobjects"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["serving.kserve.io"]
          resources: ["inferenceservices"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["monitoring.coreos.com"]
          resources: ["prometheusrules"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        - apiGroups: ["route.openshift.io"]
          resources: ["routes"]
          verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
        serviceAccountName: acc-operator-controller-manager
      deployments:
      - label:
          app.kubernetes.io/component: manager
          app.kubernetes.io/created-by: acc-operator
          app.kubernetes.io/instance: controller-manager
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: deployment
          app.kubernetes.io/part-of: acc-operator
          control-plane: controller-manager
        name: acc-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          template:
            metadata:
              labels:
                control-plane: controller-manager
            spec:
              containers:
              - args:
                - --leader-elect
                - --health-probe-bind-address=:8081
                - --metrics-bind-address=:8080
                command:
                - /manager
                image: quay.io/redhat-ai-dev/acc-operator:0.2.8
                imagePullPolicy: Always
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 8081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 8081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 256Mi
                  requests:
                    cpu: 10m
                    memory: 64Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              securityContext:
                runAsNonRoot: true
              # Pod-template-level pull secret: OLM re-reconciles the SA on
              # every upgrade and drops manual SA imagePullSecrets patches
              # (observed 0.1.0->0.1.1 on c26sx) - pod-spec secrets survive.
              imagePullSecrets:
              - name: acc-images-pull
              serviceAccountName: acc-operator-controller-manager
              terminationGracePeriodSeconds: 10
    strategy: deployment
  # Cluster-wide install is the DEFAULT (the console preselects
  # "All namespaces" when supported): one install serves every RHOAI Data
  # Science Project. The manager already watches cluster-wide (no namespace
  # scoping in cmd/main.go; RBAC is clusterPermissions-only) - namespace-
  # scoped install remains the supported OPTIONAL mode for isolation.
  installModes:
  - supported: true
    type: AllNamespaces
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  keywords:
