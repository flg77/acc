# Operator-installed catalog sample for `/etc/acc/catalogs.yaml`.
#
# Copy + edit for your deployment.  ACC's catalog resolver layers:
#   /etc/acc/catalogs.yaml          (this file — system default)
#   ~/.acc/catalogs.yaml            (per-user)
#   <workspace>/.acc/catalogs.yaml  (per-collective override)
#
# Within a layer, ``priority:`` (higher wins) breaks ties when two
# catalogs advertise the same @scope/name.
#
# Every tier requires a valid cosign signature against
# ``required_signer`` — the signing floor is non-negotiable per
# brainstorm Q3b.  Tiers differ only in policy depth (Stage 1+
# Enterprise Contract attestations on top).

catalogs:
  # ACC-canonical trusted tier — hosts the four family packs
  # extracted from this repo's roles/ tree in Stage 2:
  #   @acc/workspace-roles  (coding_agent + variants + analyst + synthesizer)
  #   @acc/research-roles   (research_*)
  #   @acc/business-roles   (HR + sales + marketing + ops + finance + legal)
  #   @acc/devops-roles     (data / devops / ml / security engineers)
  #
  # The repo is `flg77/acc-ecosystem` (created by operator in Stage 2.1).
  # Until the public `acc-roles.dev` hub goes live (Stage 2.3 DNS
  # decision), point at one of:
  #   - GitHub Releases:   https://github.com/flg77/acc-ecosystem/releases/download/<tag>/
  #   - GitHub Pages:      https://flg77.github.io/acc-ecosystem
  #   - acc1 internal hub: https://acc-hub.acc1.internal (dev only)
  - id: acc-canonical
    tier: trusted
    mode: https
    url: https://flg77.github.io/acc-ecosystem
    required_signer:
      issuer: https://token.actions.githubusercontent.com
      subject_pattern: "^https://github\\.com/flg77/acc-ecosystem/"
    priority: 100

  # Community Verified tier — free, OIDC-signed by GitHub Actions
  # identity; any publisher accepted.  Policy depth: signature +
  # manifest valid only (no ACC-internal eval attestation).
  - id: community-public
    tier: community
    mode: https
    url: https://hub.acc-roles.dev/community
    required_signer:
      issuer: https://token.actions.githubusercontent.com
      subject_pattern: ".*"
    priority: 50
