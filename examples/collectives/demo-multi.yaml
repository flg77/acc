# examples/collectives/demo-multi.yaml
# =============================================================================
# Demo parent collective (proposal 018 PR-DEMO1).
#
# Hosts the coding-demo and the financial-demo as managed sub-collectives
# (AoA-P3).  A single hub-level assistant routes a prompt into whichever
# sub-collective owns its domain via [DELEGATE:cid:reason]; each
# sub-collective carries its own assistant + workers (see demo-coding.yaml
# / demo-financial.yaml).
#
# Run:
#   acc-pkg install @acc/workspace-roles@^1.0 @acc/devops-roles@^1.0 @acc/business-roles@^1.0
#   ./acc-deploy.sh apply examples/collectives/demo-multi.yaml
# =============================================================================

collective_id: demo-multi

agents:
  - role: assistant
    cluster_id: ctl
    model: claude-haiku
  - role: orchestrator
    cluster_id: ctl
    model: claude-haiku

managed_sub_collectives:
  demo-coding:
    domain: software_engineering
    role_templates:
      - coding_agent
      - devops_engineer
    idle_hibernate_minutes: 30
    description: >
      Coding + devops sub-collective.  Owns software_engineering prompts
      (write code, playbooks, refactor, audit deps, run tests).
  demo-financial:
    domain: business_finance
    role_templates:
      - financial_analyst
      - fpa_analyst
      - contract_analyst
    idle_hibernate_minutes: 30
    description: >
      Financial-specialist sub-collective.  Owns business_finance prompts
      (forecast, FP&A variance, contract risk, sales pipeline).
