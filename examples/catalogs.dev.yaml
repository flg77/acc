# Stage-0 dev catalog — points at the internal acc1 K8s hub.
#
# The hub is a minimal HTTPS endpoint (nginx + ConfigMap-backed
# index.json + PVC for .accpkg blobs) deployed on the team's acc1
# Kubernetes cluster.  Stage 0 publishes via manual `kubectl cp` +
# index.json edit; `acc-pkg publish` (Stage 1) automates this.
#
# The required_signer points at a pilot keypair generated by
# tools/cosign-pilot-keygen.sh.  When Stage 1 swaps in OIDC keyless,
# the issuer becomes a real OIDC provider and the subject_pattern
# matches a real CI identity.
#
# Install in your dev environment with:
#   mkdir -p ~/.acc && cp examples/catalogs.dev.yaml ~/.acc/catalogs.yaml

catalogs:
  - id: acc1-internal
    tier: trusted
    mode: https
    url: https://acc-hub.acc1.internal
    required_signer:
      # Stage 0 uses cosign with a local keypair; the "issuer" field
      # carries the pilot key fingerprint and the subject_pattern is
      # always-match (signature verification still binds to the key).
      issuer: "pilot-keypair"
      subject_pattern: ".*"
    priority: 200

  # Offline / local-dev fallback: glob .accpkg files from a local dir.
  # Useful when the acc1 hub is unreachable or during the roundtrip
  # integration test (which doesn't depend on acc1 availability).
  - id: local-dist
    tier: self
    mode: file
    path: ./dist
    required_signer:
      issuer: "pilot-keypair"
      subject_pattern: ".*"
    priority: 150
