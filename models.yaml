# Central model registry (PR-MM1).
#
# Each entry is a model_id an agentset can assign to a sub-agent (via the
# Agentset Model dropdown or AgentSpec.model in collective.yaml).  At
# synthesis time acc.models.model_env turns the chosen entry into the LLM
# env vars the agent container boots on, so a collective can mix cheap
# worker models with a powerful reviewer model.
#
# Add your own entries; api_key_env names the env var holding the key
# (the key itself never lives in this file).
models:
  # ── Anthropic ────────────────────────────────────────────────────────
  - model_id: claude-opus
    backend: anthropic
    model: claude-opus-4-8
    api_key_env: ANTHROPIC_API_KEY
    label: "Claude Opus 4.8 (STRONGEST — control + reviewer)"
    notes: "Key from ACC_ANTHROPIC_API_KEY or ANTHROPIC_API_KEY."
  - model_id: claude-sonnet
    backend: anthropic
    model: claude-sonnet-4-6
    label: "Claude Sonnet 4.6 (powerful — reviewer)"
    notes: "Key from ACC_ANTHROPIC_API_KEY or ANTHROPIC_API_KEY."
  - model_id: claude-haiku
    backend: anthropic
    model: claude-haiku-4-6
    label: "Claude Haiku (cheap/fast — worker)"
    notes: "Needs ACC_ANTHROPIC_API_KEY."

  # ── Local / edge (Ollama) ────────────────────────────────────────────
  - model_id: ollama-llama32-3b
    backend: ollama
    model: "llama3.2:3b"
    base_url: "http://localhost:11434"
    label: "Ollama Llama 3.2 3B (local, cheap — worker)"
  - model_id: ollama-qwen25-14b
    backend: ollama
    model: "qwen2.5:14b"
    base_url: "http://localhost:11434"
    label: "Ollama Qwen2.5 14B (local, stronger — reviewer)"

  # ── vLLM (self-hosted, OpenAI-compatible) ────────────────────────────
  - model_id: vllm-local
    backend: vllm
    model: "meta-llama/Llama-3.1-70B-Instruct"
    base_url: "http://localhost:8000/v1"
    label: "vLLM Llama 3.1 70B (self-hosted)"
  # lighthouse RHAIIS vLLM — set base_url to whatever the AGENT containers can
  # reach (the host IP / service name, not localhost from inside a container).
  # No api_key needed for the local server; add api_key_env if you front it.
  - model_id: lighthouse-llama32-3b
    backend: vllm
    model: "RedHatAI/Llama-3.2-3B-Instruct-FP8"
    base_url: "http://lighthouse:8022/v1"
    label: "Lighthouse vLLM Llama 3.2 3B FP8"

  # ── OpenAI-compatible providers (KEYED gateways) ─────────────────────
  # A gateway that requires an API key MUST use backend: openai_compat (it
  # sends "Authorization: Bearer <key>"); backend: vllm sends NO auth header
  # and is only for an unauthenticated self-hosted server.  api_key_env names
  # the env var holding the key — set the value in .env (NOT here).
  - model_id: groq-llama33-70b
    backend: openai_compat
    model: "llama-3.3-70b-versatile"
    base_url: "https://api.groq.com/openai/v1"
    api_key_env: "GROQ_API_KEY"
    label: "Groq Llama 3.3 70B (fast, cheap)"
  # LiteLLM gateway (RHDP MaaS) — keyed, so openai_compat + api_key_env.
  # Put the key in .env:  LITELLM_API_KEY=sk-...
  - model_id: rhdp-deepseek-r1-distill-qwen-14b
    backend: openai_compat
    model: "openai/deepseek-r1-distill-qwen-14b"
    base_url: "https://litellm-prod.apps.maas.redhatworkshops.io/v1"
    api_key_env: "LITELLM_API_KEY"
    label: "RHDP LiteLLM DeepSeek-R1-Distill-Qwen 14B"
  # RHDP MaaS gateway — ONE LiteLLM endpoint + ONE key, two models — used by
  # the end-to-end demo collective (collectives/collective.e2e-demo.yaml).
  # Keyed → openai_compat + api_key_env.  Put the key in .env (NOT here):
  #   MAAS_API_KEY=sk-...     # the "click-show-key-to-reveal" LiteLLM key
  - model_id: maas-qwen3-14b
    backend: openai_compat
    model: "qwen3-14b"
    base_url: "https://maas-rhdp.apps.maas.redhatworkshops.io/v1"
    api_key_env: "MAAS_API_KEY"
    label: "RHDP MaaS Qwen3 14B (powerful — reviewer)"
  - model_id: maas-llama-scout-17b
    backend: openai_compat
    model: "llama-scout-17b"
    base_url: "https://maas-rhdp.apps.maas.redhatworkshops.io/v1"
    api_key_env: "MAAS_API_KEY"
    label: "RHDP MaaS Llama Scout 17B (coding agents)"

# ── Role → model mapping (B6, proposal 044) ────────────────────────────────
# The ONE visible source of truth for which model each ROLE runs on.  Each
# value is a model_id from the `models:` list above.  An agent resolves its
# model at boot (acc.models.apply_role_model_env): a collective.yaml per-agent
# `model:` override wins, else this `role_models` mapping, else the global
# ACC_LLM_* default in .env.  Inspect live with `/model` (the Target role) or
# `/model --all`.  Roles omitted here use the global default — so this block is
# inert until you uncomment + populate it.  Keep keys = role names.
#
# role_models:
#   assistant: maas-qwen3-14b          # capable model for the gatekeeper
#   orchestrator: maas-qwen3-14b       # routing needs reasoning
#   reviewer: claude-sonnet            # strong critic
#   research_synthesizer: claude-sonnet
#   research_critic: claude-sonnet
