# ACC collective preset — coding-split agentset.
#
# Three peer `coding_agent` workers in cluster `backend`, mirroring the
# legacy `CODING_SPLIT=true ./acc-deploy.sh up` flow but driven from
# this declarative YAML instead of an env-var profile.
#
# Apply:
#   ./acc-deploy.sh apply collective.coding-split.yaml
# The synthesized podman services are named `acc-cell-coding-1/2/3`
# (distinct from the legacy `profiles: [coding-split]` services
# `acc-coding-1/2/3` in the base compose, which are deprecated and
# go away in PR-E once this path is live for one release).

collective_id: sol-01

agents:
  - role: coding_agent
    replicas: 3
    cluster_id: backend
    purpose: "Implement the planner's decomposed coding tasks in parallel."
    agent_id_prefix: coding
