# acc-config.yaml — lighthouse / qwen-coder-7b-awq
#
# Recommended for coding_agent.  AWQ-Int4, ~5 GB.  Tuned for JSON-fenced code output the system prompt expects.
#
# Launch on lighthouse:
#   cd /git/infrastructure/containers/vllm/vllmpunch
#   ./vllmpunch run -d qwen-coder-7b-awq
#
# Sync to the test host:
#   ./scripts/sync-host-config.sh lighthouse qwen-coder-7b-awq

deploy_mode: standalone

agent:
  role: ingester
  collective_id: sol-01
  heartbeat_interval_s: 30

signaling:
  backend: nats
  nats_url: nats://localhost:4222

vector_db:
  backend: lancedb
  lancedb_path: /app/data/lancedb
  milvus_uri: ""
  milvus_collection_prefix: acc_

llm:
  backend: openai_compat
  base_url: http://host.containers.internal:8013/v1
  model: Qwen/Qwen2.5-Coder-7B-Instruct-AWQ
  request_timeout_s: 120
  max_retries: 2

observability:
  log_level: INFO
  metrics_backend: none
