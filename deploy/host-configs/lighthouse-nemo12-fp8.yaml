# acc-config.yaml — lighthouse / nemo12-fp8
#
# 12B at FP8 + fp8 kv_cache → tight on 12 GB.  Disable kv_cache fp8 if you hit OOM.
#
# Launch on lighthouse:
#   cd /git/infrastructure/containers/vllm/vllmpunch
#   ./vllmpunch run -d nemo12
#
# Sync to the test host:
#   ./scripts/sync-host-config.sh lighthouse nemo12-fp8

deploy_mode: standalone

agent:
  role: ingester
  collective_id: sol-01
  heartbeat_interval_s: 30

signaling:
  backend: nats
  nats_url: nats://localhost:4222

vector_db:
  backend: lancedb
  lancedb_path: /app/data/lancedb
  milvus_uri: ""
  milvus_collection_prefix: acc_

llm:
  backend: openai_compat
  base_url: http://host.containers.internal:8002/v1
  model: neuralmagic/Mistral-NeMo-Instruct-2407-FP8
  request_timeout_s: 120
  max_retries: 2

observability:
  log_level: INFO
  metrics_backend: none
