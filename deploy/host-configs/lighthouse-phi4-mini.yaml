# acc-config.yaml — lighthouse / phi4-mini
#
# Microsoft Phi-4 mini.  Smaller than 7B but more capable than Llama-3.2-1B on most reasoning benchmarks.
#
# Launch on lighthouse:
#   cd /git/infrastructure/containers/vllm/vllmpunch
#   ./vllmpunch run -d phi4
#
# Sync to the test host:
#   ./scripts/sync-host-config.sh lighthouse phi4-mini

deploy_mode: standalone

agent:
  role: ingester
  collective_id: sol-01
  heartbeat_interval_s: 30

signaling:
  backend: nats
  nats_url: nats://localhost:4222

vector_db:
  backend: lancedb
  lancedb_path: /app/data/lancedb
  milvus_uri: ""
  milvus_collection_prefix: acc_

llm:
  backend: openai_compat
  base_url: http://host.containers.internal:8003/v1
  model: microsoft/Phi-4-mini-instruct
  request_timeout_s: 120
  max_retries: 2

observability:
  log_level: INFO
  metrics_backend: none
