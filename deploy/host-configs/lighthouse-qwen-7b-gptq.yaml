# acc-config.yaml — lighthouse / qwen-7b-gptq
#
# General-purpose 7B, GPTQ-Int4, ~4 GB.  Good fallback when the coder-specific Qwen isn't pulled.
#
# Launch on lighthouse:
#   cd /git/infrastructure/containers/vllm/vllmpunch
#   ./vllmpunch run -d qwen-7b-gptq
#
# Sync to the test host:
#   ./scripts/sync-host-config.sh lighthouse qwen-7b-gptq

deploy_mode: standalone

agent:
  role: ingester
  collective_id: sol-01
  heartbeat_interval_s: 30

signaling:
  backend: nats
  nats_url: nats://localhost:4222

vector_db:
  backend: lancedb
  lancedb_path: /app/data/lancedb
  milvus_uri: ""
  milvus_collection_prefix: acc_

llm:
  backend: openai_compat
  base_url: http://host.containers.internal:8014/v1
  model: Qwen/Qwen2.5-7B-Instruct-GPTQ-Int4
  request_timeout_s: 120
  max_retries: 2

observability:
  log_level: INFO
  metrics_backend: none
