# acc-config.yaml — lighthouse / llama-3b-fp8
#
# Smallest meaningful upgrade from 1B.  Add to vllmpunch-models.json with host_port=8011 before launching.
#
# Launch on lighthouse:
#   cd /git/infrastructure/containers/vllm/vllmpunch
#   ./vllmpunch run -d llama-3b-fp8
#
# Sync to the test host:
#   ./scripts/sync-host-config.sh lighthouse llama-3b-fp8

deploy_mode: standalone

agent:
  role: ingester
  collective_id: sol-01
  heartbeat_interval_s: 30

signaling:
  backend: nats
  nats_url: nats://localhost:4222

vector_db:
  backend: lancedb
  lancedb_path: /app/data/lancedb
  milvus_uri: ""
  milvus_collection_prefix: acc_

llm:
  backend: openai_compat
  base_url: http://host.containers.internal:8022/v1
  model: RedHatAI/Llama-3.2-3B-Instruct-FP8
  request_timeout_s: 120
  max_retries: 2

observability:
  log_level: INFO
  metrics_backend: none
