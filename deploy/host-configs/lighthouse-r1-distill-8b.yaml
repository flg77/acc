# acc-config.yaml — lighthouse / r1-distill-8b
#
# DeepSeek R1 distill at FP8, 8B.  Reasoning-tuned — long CoT outputs; set request_timeout_s up if the operator prompts include reasoning.
#
# Launch on lighthouse:
#   cd /git/infrastructure/containers/vllm/vllmpunch
#   ./vllmpunch run -d r1-8b
#
# Sync to the test host:
#   ./scripts/sync-host-config.sh lighthouse r1-distill-8b

deploy_mode: standalone

agent:
  role: ingester
  collective_id: sol-01
  heartbeat_interval_s: 30

signaling:
  backend: nats
  nats_url: nats://localhost:4222

vector_db:
  backend: lancedb
  lancedb_path: /app/data/lancedb
  milvus_uri: ""
  milvus_collection_prefix: acc_

llm:
  backend: openai_compat
  base_url: http://host.containers.internal:8001/v1
  model: neuralmagic/DeepSeek-R1-Distill-Llama-8B-FP8
  request_timeout_s: 120
  max_retries: 2

observability:
  log_level: INFO
  metrics_backend: none
