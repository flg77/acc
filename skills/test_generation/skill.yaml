# skills/test_generation/skill.yaml — coding-cluster persona skill (stub).

purpose:        "Test-generation marker — round-trips the LLM's emitted pytest module."
version:        "0.1.0"
adapter_class:  "StubCodingSkill"
risk_level:     "LOW"
domain_id:      "software_engineering"
tags:           ["coding", "testing", "stub"]

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "The pytest module body the LLM produced."
  required: ["text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:    {type: boolean}
    text:  {type: string}
    skill_id: {type: string}
  required: ["ok", "text", "skill_id"]
  additionalProperties: false

description: |
  Default skill of `coding_agent_tester`.  Audit anchor for test
  authoring; the test runner is a separate skill (`test_execution`).
