# skills/python_exec/skill.yaml — opt-in arbitrary Python execution.
#
# Sibling of shell_exec. HIGH-risk; gated by ``requires_actions:
# [execute_shell]`` AND the operator-approved Compliance oversight queue
# (every invocation enqueues an OVERSIGHT_SUBMIT; the operator approves per
# call). Roles must also set ``max_skill_risk_level: HIGH``.
#
# Why: gives agents real compute — parse/transform data, do arithmetic,
# probe the system, or drive `python -m acc.pkg.cli ...` — instead of only
# describing what they would do. Same blast radius as shell_exec (which can
# already run `python -c`), so it shares the same action label + risk gate.

purpose:        "Run a Python snippet in an isolated subprocess and return stdout/stderr."
version:        "0.1.0"
adapter_class:  "PythonExecSkill"
risk_level:     "HIGH"
domain_id:      "os_basics"
tags:           ["python", "subprocess", "engineering", "compute"]

requires_actions:
  - "execute_shell"

input_schema:
  type: object
  properties:
    code:
      type: string
      minLength: 1
      description: "Python source executed via `python -I -c <code>` (isolated mode)."
    cwd:
      type: string
      description: "Working directory (must exist)."
    timeout_s:
      type: integer
      minimum: 1
      maximum: 600
      description: "Subprocess timeout in seconds (default 30, max 600)."
  required: ["code"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    returncode: { type: integer }
    stdout: { type: string }
    stderr: { type: string }
    duration_s: { type: number }
  required: ["returncode", "stdout", "stderr", "duration_s"]
  additionalProperties: false

description: |
  Execute a Python snippet via subprocess.run([python, "-I", "-c", code],
  shell=False, …). Isolated mode (-I) ignores PYTHONPATH and the user site so
  the snippet does not silently import the agent's own modules. Every call is
  HIGH risk and requires both an operator-approved oversight verdict and the
  role's ``execute_shell`` action label. Output capped at 64 KB stdout +
  16 KB stderr.
