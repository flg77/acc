purpose: Read + parse a JSON file (cross-platform).
version: 0.1.0
adapter_class: ReadJsonSkill
risk_level: LOW
domain_id: xplatform
tags:
- xplatform
input_schema:
  type: object
  properties:
    path:
      type: string
    max_bytes:
      type: integer
      minimum: 1
      maximum: 16777216
  required:
