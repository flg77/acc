  additionalProperties: false
output_schema:
  type: object
  properties:
    path:
      type: string
    data: {}
    bytes:
      type: integer
    truncated:
      type: boolean
  required:
  - path
  - data
  - bytes
  - truncated
  additionalProperties: false
description: Read + parse a JSON file (cross-platform).
