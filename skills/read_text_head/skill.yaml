purpose: Read the first N bytes of a UTF-8 text file.
version: 0.1.0
adapter_class: ReadTextHeadSkill
risk_level: LOW
domain_id: os_basics
tags:
- os_basics
input_schema:
  type: object
  properties:
    path:
      type: string
    max_bytes:
      type: integer
      minimum: 1
      maximum: 1048576
  required:
  - path
  additionalProperties: false
output_schema:
  type: object
  properties:
    path:
      type: string
    content:
      type: string
    bytes:
      type: integer
    truncated:
      type: boolean
  required:
  - path
  - content
  - bytes
  - truncated
  additionalProperties: false
description: Read the first N bytes of a UTF-8 text file.
