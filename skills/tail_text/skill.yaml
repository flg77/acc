purpose: Read the last N lines of a UTF-8 text file (cross-platform).
version: 0.1.0
adapter_class: TailTextSkill
risk_level: LOW
domain_id: xplatform
tags:
- xplatform
input_schema:
  type: object
  properties:
    path:
      type: string
    lines:
      type: integer
      minimum: 1
      maximum: 10000
  required:
  - path
  additionalProperties: false
output_schema:
  type: object
  properties:
    path:
      type: string
    lines:
      type: array
    count:
      type: integer
  required:
  - path
  - lines
  - count
  additionalProperties: false
description: Read the last N lines of a UTF-8 text file (cross-platform).
