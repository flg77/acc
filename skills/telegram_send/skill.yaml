# skills/telegram_send/skill.yaml — outbound Telegram message (Bot API).
#
# Pillar-1 ("reach") of the personal-assistant integration set. The bot token
# comes from TELEGRAM_BOT_TOKEN (env, per-deploy — never committed). MEDIUM
# risk: an externally-visible action gated by Cat-A A-017 + describe-not-invoke
# (the agent emits [ACTION: send_message ...]; capability_dispatch validates).

purpose:        "Send a text message to a Telegram chat via the official Bot API."
version:        "0.1.0"
adapter_class:  "TelegramSendSkill"
risk_level:     "MEDIUM"
requires_actions:
  - "send_message"
domain_id:      "messaging"
tags:           ["messaging", "telegram", "outbound", "notify"]

input_schema:
  type: object
  properties:
    chat_id:
      description: "Telegram chat id (numeric) or @channel handle."
      anyOf:
        - { type: string, minLength: 1 }
        - { type: integer }
    text:
      type: string
      minLength: 1
      maxLength: 4096
      description: "Message body (Telegram caps a single message at 4096 chars)."
  required: ["chat_id", "text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:          { type: boolean }
    message_id:  { type: integer, minimum: 0 }
  required: ["ok", "message_id"]
  additionalProperties: false

description: |
  Posts to `https://api.telegram.org/bot<TOKEN>/sendMessage`. Returns the
  Telegram-assigned message_id on success. Token from `TELEGRAM_BOT_TOKEN`;
  a missing token raises a recoverable SkillInvocationError (fail-closed in
  prod operator-mode). Read the proposal: ACC-PR/Proposals/PR-PROPOSAL-A.
