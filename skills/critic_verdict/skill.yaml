# skills/critic_verdict/skill.yaml — autoresearcher persona skill (stub).
#
# Used by the research_critic persona to publish its structured
# verdict on the synthesizer's draft.  When the verdict carries
# `verdict: NEEDS_REVISE`, the agent's CognitiveCore is responsible
# for setting the matching field on the EVAL_OUTCOME payload
# (E1's iteration loop reads `eval_outcome.verdict` from
# TASK_COMPLETE; this skill is the audit anchor for the verdict
# itself).

purpose:        "Critic verdict — round-trips PASS/NEEDS_REVISE/FAIL with critique text."
version:        "0.1.0"
adapter_class:  "StubResearchSkill"
risk_level:     "LOW"
domain_id:      "business_research"
tags:           ["research", "review", "iteration", "stub"]

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "JSON-encoded {verdict, score, critique, prompt_patch?}."
  required: ["text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:    {type: boolean}
    text:  {type: string}
    skill_id: {type: string}
  required: ["ok", "text", "skill_id"]
  additionalProperties: false

description: |
  Default skill of `research_critic`.  Pairs with E1's iteration
  loop: when the critic emits NEEDS_REVISE, the persona's
  CognitiveCore lifts the structured payload onto
  EVAL_OUTCOME.verdict + EVAL_OUTCOME.critique so the arbiter
  re-issues the synthesize step.
