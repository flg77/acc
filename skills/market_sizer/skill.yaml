# skills/market_sizer/skill.yaml — autoresearcher persona skill (stub).

purpose:        "Market-size marker — round-trips TAM/SAM/SOM estimates."
version:        "0.1.0"
adapter_class:  "StubResearchSkill"
risk_level:     "LOW"
domain_id:      "economic_analysis"
tags:           ["research", "market", "economics", "stub"]

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "JSON-encoded {tam, sam, som, year, source_urls} structure."
  required: ["text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:    {type: boolean}
    text:  {type: string}
    skill_id: {type: string}
  required: ["ok", "text", "skill_id"]
  additionalProperties: false

description: |
  Default skill of `research_economist`.  Personas emit each
  market-size estimate as one invocation so the cluster panel +
  episode log show "this run produced N sized estimates" without
  scraping the synthesizer's draft.
