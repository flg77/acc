purpose: Run `git log -n N --oneline` in a workspace directory.
version: 0.1.0
adapter_class: GitLogRecentSkill
risk_level: MEDIUM
domain_id: git
tags:
- git
input_schema:
  type: object
  properties:
    cwd:
      type: string
    limit:
      type: integer
      minimum: 1
      maximum: 200
  required:
  - cwd
  additionalProperties: false
output_schema:
  type: object
  properties:
    cwd:
      type: string
    returncode:
      type: integer
    stdout:
      type: string
    stderr:
      type: string
  required:
  - cwd
  - returncode
  - stdout
  - stderr
  additionalProperties: false
description: Run `git log -n N --oneline` in a workspace directory.
