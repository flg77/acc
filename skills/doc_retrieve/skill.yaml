# skills/doc_retrieve/skill.yaml — governed RAG retrieval (proposal 024 P3).
#
# Read-only nearest-chunk retrieval from the collective-scoped document
# store.  Scope is enforced by the store (kernel-level allowlist on the
# TurboVec backend; post-filter elsewhere) from the agent's own
# collective_id — NOT from any model-supplied argument.  risk_level LOW:
# pure read, no mutation, no filesystem.

purpose:        "Retrieve the most relevant document chunks for a query (governed, collective-scoped)."
version:        "0.1.0"
adapter_class:  "DocRetrieveSkill"
risk_level:     "LOW"
domain_id:      "document_store"
tags:           ["rag", "retrieval", "document_store", "read"]

input_schema:
  type: object
  properties:
    query:
      type: string
      description: "Natural-language query; embedded and matched against stored chunks."
    top_k:
      type: integer
      minimum: 1
      maximum: 50
      description: "Maximum chunks to return (default 5)."
    doc_id:
      type: string
      description: "Optional — restrict retrieval to a single ingested document."
  required: ["query"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    results:
      type: array
      items:
        type: object
        properties:
          doc_id:  {type: string}
          seq:     {type: integer}
          text:    {type: string}
          title:   {type: string}
          source:  {type: string}
        required: [doc_id, seq, text]
    scope:
      type: string
  required: [results, scope]
  additionalProperties: false

description: |
  Governed RAG retrieval (proposal 024 P3).  Embeds the query and returns
  the top-k nearest document chunks, scoped to the agent's collective —
  on the TurboVec backend the scope is enforced inside the SIMD search
  kernel (no over-fetch); other backends post-filter.  Each result
  carries citation fields (doc_id, seq, title, source) so the role can
  attribute its answer.  Granted automatically to roles with
  ``document_store: true`` (e.g. the @acc/rag-roles librarian).
