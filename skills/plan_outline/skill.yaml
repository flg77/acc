# skills/plan_outline/skill.yaml — autoresearcher persona skill (stub).
#
# Pass-through anchor for the research_planner persona's
# `[SKILL: plan_outline {"text": "..."}]` markers.  The LLM emits a
# JSON outline; the skill registry round-trips the text and tags
# the audit log with the skill_id.  Cat-A A-017 enforces that only
# personas listing plan_outline in allowed_skills may invoke it.
#
# Real implementation roadmap: a structured JSON Schema validator
# that rejects outlines missing required sections.  v1 (this PR) is
# governance + audit anchor only.

purpose:        "Plan-outline marker — round-trips the LLM's research outline."
version:        "0.1.0"
adapter_class:  "StubResearchSkill"
risk_level:     "LOW"
domain_id:      "business_research"
tags:           ["research", "planning", "stub"]

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "JSON-encoded outline produced by the planner persona."
  required: ["text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:    {type: boolean}
    text:  {type: string}
    skill_id: {type: string}
  required: ["ok", "text", "skill_id"]
  additionalProperties: false

description: |
  Default skill of `research_planner`.  Records the published
  outline on TASK_COMPLETE.invocations so the cluster panel +
  episode log surface "this run had a planner pass" without
  needing to peek inside the scratchpad.
