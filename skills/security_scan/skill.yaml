# skills/security_scan/skill.yaml — coding-cluster persona skill (stub).

purpose:        "Security-scan marker — round-trips findings emitted by the LLM."
version:        "0.1.0"
adapter_class:  "StubCodingSkill"
risk_level:     "LOW"
domain_id:      "security_audit"
tags:           ["coding", "security", "audit", "stub"]

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "The security findings the LLM produced (severity, CVE, etc.)."
  required: ["text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:    {type: boolean}
    text:  {type: string}
    skill_id: {type: string}
  required: ["ok", "text", "skill_id"]
  additionalProperties: false

description: |
  Allowed skill on `coding_agent_reviewer` and
  `coding_agent_dependency`.  HIGH / CRITICAL findings are expected
  to trigger ALERT_ESCALATE separately — that is a CognitiveCore
  responsibility, not the skill's.
