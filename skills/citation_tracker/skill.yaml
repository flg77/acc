# skills/citation_tracker/skill.yaml — autoresearcher persona skill (stub).
#
# Personas emit `[SKILL: citation_tracker {"text": "<JSON list of {url,
# claim, confidence}>"}]` markers as they accumulate sourcing.  The
# adapter round-trips the JSON.  E5's critic re-fetches a sample of
# these URLs to defend against fabricated citations.

purpose:        "Citation tracker — records URL → claim → confidence triples."
version:        "0.1.0"
adapter_class:  "StubResearchSkill"
risk_level:     "LOW"
domain_id:      "business_research"
tags:           ["research", "citation", "audit", "stub"]

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "JSON-encoded list of {url, claim, confidence} entries."
  required: ["text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:    {type: boolean}
    text:  {type: string}
    skill_id: {type: string}
  required: ["ok", "text", "skill_id"]
  additionalProperties: false

description: |
  Used by every researcher persona + the synthesizer.  Captures
  every citation the LLM emits so the final report's bibliography
  can be reconstructed from TASK_COMPLETE.invocations alone.
  The critic persona's E5 re-fetch path consumes this list.
