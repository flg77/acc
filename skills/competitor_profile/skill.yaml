# skills/competitor_profile/skill.yaml — autoresearcher persona skill (stub).

purpose:        "Competitor-profile marker — round-trips a vendor card."
version:        "0.1.0"
adapter_class:  "StubResearchSkill"
risk_level:     "LOW"
domain_id:      "competitive_analysis"
tags:           ["research", "competitor", "vendor", "stub"]

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "JSON-encoded vendor profile (name, architecture, pricing, etc.)."
  required: ["text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:    {type: boolean}
    text:  {type: string}
    skill_id: {type: string}
  required: ["ok", "text", "skill_id"]
  additionalProperties: false

description: |
  Default skill of `research_competitor`; allowed on
  `research_strategist` for cross-checks.  One invocation per
  profiled vendor — Bedrock Agents, Agentspace, Copilot Studio,
  watsonx Orchestrate, CrewAI, LangGraph, Letta, etc.
