purpose: Find files by glob under a root, bounded depth + count.
version: 0.1.0
adapter_class: FindFilesSkill
risk_level: LOW
domain_id: os_basics
tags:
- os_basics
input_schema:
  type: object
  properties:
    root:
      type: string
    pattern:
      type: string
    max_results:
      type: integer
      minimum: 1
      maximum: 2000
  required:
  - root
  additionalProperties: false
output_schema:
  type: object
  properties:
    root:
      type: string
    pattern:
      type: string
    files:
      type: array
    truncated:
      type: boolean
  required:
  - root
  - pattern
  - files
  - truncated
  additionalProperties: false
description: Find files by glob under a root, bounded depth + count.
