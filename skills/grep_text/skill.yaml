purpose: Search for a literal pattern in a file (line-by-line).
version: 0.1.0
adapter_class: GrepTextSkill
risk_level: LOW
domain_id: os_basics
tags:
- os_basics
input_schema:
  type: object
  properties:
    path:
      type: string
    pattern:
      type: string
      minLength: 1
    max_matches:
      type: integer
      minimum: 1
      maximum: 500
  required:
  - path
  - pattern
  additionalProperties: false
output_schema:
  type: object
  properties:
    path:
      type: string
    pattern:
      type: string
    matches:
      type: array
  required:
  - path
  - pattern
  - matches
  additionalProperties: false
description: Search for a literal pattern in a file (line-by-line).
