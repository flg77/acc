# skills/dependency_audit/skill.yaml — coding-cluster persona skill (stub).

purpose:        "Dependency-audit marker — round-trips CVE + license findings."
version:        "0.1.0"
adapter_class:  "StubCodingSkill"
risk_level:     "LOW"
domain_id:      "security_audit"
tags:           ["coding", "dependencies", "security", "stub"]

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "The dependency-audit report the LLM produced."
  required: ["text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:    {type: boolean}
    text:  {type: string}
    skill_id: {type: string}
  required: ["ok", "text", "skill_id"]
  additionalProperties: false

description: |
  Default skill of `coding_agent_dependency`.  Audit anchor for
  CVE + license-incompatibility findings.  Replacing this with
  a real `pip-audit` / `osv-scanner` adapter is a separate
  hardening track.
