# skills/code_generation/skill.yaml — coding-cluster persona skill (stub).
#
# Pass-through marker for coding_agent_implementer output.  The
# adapter does not run a real codegen pipeline; the LLM's structured
# output IS the generated code.

purpose:        "Code-generation marker — round-trips the LLM's emitted code verbatim."
version:        "0.1.0"
adapter_class:  "StubCodingSkill"
risk_level:     "LOW"
domain_id:      "software_engineering"
tags:           ["coding", "generation", "stub"]

input_schema:
  type: object
  properties:
    text:
      type: string
      description: "The implementation the LLM produced."
  required: ["text"]
  additionalProperties: false

output_schema:
  type: object
  properties:
    ok:    {type: boolean}
    text:  {type: string}
    skill_id: {type: string}
  required: ["ok", "text", "skill_id"]
  additionalProperties: false

description: |
  Default skill of `coding_agent_implementer`.  Skill_id is the audit
  anchor + the cluster-panel `skill_in_use` value.  Risk LOW.
