purpose: List entries of a directory (non-recursive, bounded).
version: 0.1.0
adapter_class: LsDirSkill
risk_level: LOW
domain_id: os_basics
tags:
- os_basics
input_schema:
  type: object
  properties:
    path:
      type: string
    max_entries:
      type: integer
      minimum: 1
      maximum: 1000
  required:
  - path
  additionalProperties: false
output_schema:
  type: object
  properties:
    path:
      type: string
    entries:
      type: array
    truncated:
      type: boolean
  required:
  - path
  - entries
  - truncated
  additionalProperties: false
description: List entries of a directory (non-recursive, bounded).
