# Installs the ACC operator on blackbox3 from the local catalog
# (CatalogSource → OperatorGroup → Subscription → CSV).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: acc-operator-olm
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/flg77/acc.git
    targetRevision: main
    path: gitops/olm/overlays/blackbox3
  destination:
    name: blackbox3          # ArgoCD-registered cluster name
    namespace: acc-operator-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
