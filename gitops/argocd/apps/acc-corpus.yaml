# Deploys the sample AgentCorpus + AgentCollective once the operator's CRDs
# are installed. Manual sync by default (apply after the operator is Ready).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: acc-corpus
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/flg77/acc.git
    targetRevision: main
    path: gitops/samples/base
  destination:
    name: blackbox3
    namespace: acc-system
  syncPolicy:
    # No automated sync — apply after the CRDs exist + the Cat-A WASM
    # ConfigMap is in place, to avoid a transient SyncFailed on first run.
    syncOptions:
      - CreateNamespace=true
