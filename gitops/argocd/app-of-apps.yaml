# App-of-apps — register this once in the ArgoCD on acc1; it pulls in the
# child Applications under gitops/argocd/apps (OLM install + sample corpus).
#
# Prereq: the blackbox3 cluster is registered in ArgoCD as a destination named
# `blackbox3` (argocd cluster add / a cluster Secret). Edit repoURL to your
# fork if different.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: acc-bringup
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/flg77/acc.git
    targetRevision: main
    path: gitops/argocd/apps
  destination:
    # The ArgoCD instance's own cluster (acc1) hosts the child Application
    # objects; each child targets blackbox3.
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    syncOptions:
      - CreateNamespace=false
