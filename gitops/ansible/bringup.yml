---
# AAP playbook (aap1) — end-to-end operator bring-up on blackbox3.
# Token-cheap repeatable ops: kick the Tekton build, wait for the operator
# CSV, apply the corpus, then hand off to the smoke check. Declarative;
# re-runnable. Wire as an AAP Job Template targeting the blackbox3 kubeconfig.
#
# Requires: kubernetes.core collection; KUBECONFIG / k8s auth for blackbox3.
- name: ACC operator bring-up (blackbox3)
  hosts: localhost
  gather_facts: false
  vars:
    op_ns: acc-operator-system
    corpus_ns: acc-system
    csv_prefix: acc-operator
  tasks:
    - name: Trigger the operator build pipeline
      kubernetes.core.k8s:
        state: present
        namespace: "{{ op_ns }}"
        definition: "{{ lookup('file', '../tekton/pipelinerun.yaml') | from_yaml }}"
      register: plr

    - name: Wait for the operator CSV to reach Succeeded
      kubernetes.core.k8s_info:
        api_version: operators.coreos.com/v1alpha1
        kind: ClusterServiceVersion
        namespace: "{{ op_ns }}"
      register: csvs
      retries: 60
      delay: 10
      until: >
        csvs.resources
        | selectattr('metadata.name', 'match', '^' ~ csv_prefix)
        | selectattr('status.phase', 'equalto', 'Succeeded')
        | list | length > 0

    - name: Apply the AgentCorpus + AgentCollective (Cat-A WASM CM included)
      kubernetes.core.k8s:
        state: present
        namespace: "{{ corpus_ns }}"
        src: "{{ item }}"
      loop:
        - ../samples/base/namespace.yaml
        - ../samples/base/cat-a-wasm-configmap.yaml
        - ../samples/base/agentcorpus.yaml
        - ../samples/base/agentcollective.yaml
