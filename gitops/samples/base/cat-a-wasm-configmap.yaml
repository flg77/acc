# Category-A WASM ConfigMap — REQUIRED before any AgentCorpus (the validation
# webhook rejects a corpus whose wasmConfigMapRef is missing).
#
# LAB PLACEHOLDER: an empty blob passes webhook validation. For real
# enforcement, replace category_a.wasm with the compiled Cat-A OPA policy
# (see regulatory_layer/category_a/constitutional_rhoai.rego) — e.g.
#   oc create configmap acc-cat-a-wasm --from-file=category_a.wasm=./category_a.wasm -n acc-system
apiVersion: v1
kind: ConfigMap
metadata:
  name: acc-cat-a-wasm
  namespace: acc-system
binaryData:
  category_a.wasm: ""
