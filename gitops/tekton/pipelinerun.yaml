# Template PipelineRun — kicks acc-operator-build. Apply with `oc create -f`
# (a new run each time) or let the Ansible kickoff (gitops/ansible) generate it.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: acc-operator-build-
  namespace: acc-operator-system
spec:
  pipelineRef:
    name: acc-operator-build
  params:
    - { name: git-url, value: https://github.com/flg77/acc.git }
    - { name: git-revision, value: main }
    - { name: version, value: "0.1.0" }
  workspaces:
    - name: shared
      volumeClaimTemplate:
        spec:
          accessModes: [ReadWriteOnce]
          resources:
            requests:
              storage: 2Gi
    - name: dockerconfig
      # The pipeline ServiceAccount's internal-registry dockercfg secret.
      # `oc create sa pipeline` + an image-builder rolebinding provides it;
      # name varies — set to the actual <sa>-dockercfg-* secret.
      secret:
        secretName: pipeline-dockercfg
