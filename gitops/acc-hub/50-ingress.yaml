apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: acc-hub
  namespace: acc-hub
  labels:
    app.kubernetes.io/name: acc-hub
  annotations:
    # If acc1 uses cert-manager for cluster-internal certs, uncomment
    # and adjust the ClusterIssuer name:
    # cert-manager.io/cluster-issuer: "acc1-internal-ca"
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  # ingressClassName matches the controller installed on acc1 — edit
  # if your cluster uses a different one (e.g. "openshift-default" on
  # OCP, "traefik" elsewhere).
  ingressClassName: nginx
  tls:
    - hosts:
        - acc-hub.acc1.internal
      secretName: acc-hub-tls
  rules:
    - host: acc-hub.acc1.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: acc-hub
                port:
                  number: 80
