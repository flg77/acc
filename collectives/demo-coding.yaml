# collectives/demo-coding.yaml
# =============================================================================
# Demo collective — coding + devops (proposal 018 PR-DEMO1).
#
# Showcases the assistant → orchestrator → worker → reviewer flow for
# technical tasks (write a playbook, refactor, audit deps, run tests).
# Consumes the @acc/workspace-roles + @acc/devops-roles family packs.
#
# Run:
#   ./acc-deploy.sh pkg add @acc/workspace-roles    # or: acc-pkg install @acc/workspace-roles@^1.0
#   ./acc-deploy.sh pkg add @acc/devops-roles
#   ./acc-deploy.sh apply demo-coding               # (apply also auto-installs via required_packages)
#
# Models are real models.yaml ids (the operator runs on Anthropic).
# Swap to local ids (ollama-llama32-3b / ollama-qwen25-14b / vllm-local)
# for an offline demo — the topology is model-agnostic.
# =============================================================================

collective_id: demo-coding

required_packages:
  - "@acc/workspace-roles@^1.0"
  - "@acc/devops-roles@^1.0"

agents:
  # --- control plane (in-tree CONTROL roles) ---
  - role: assistant
    cluster_id: ctl
    model: claude-haiku
  - role: orchestrator
    cluster_id: ctl
    model: claude-haiku
  - role: reviewer
    cluster_id: ctl
    model: claude-sonnet        # critic loop on the stronger model (PR-MM3)
  - role: compliance_officer
    cluster_id: ctl
    model: claude-haiku

  # --- workers (from @acc/workspace-roles + @acc/devops-roles) ---
  - role: coding_agent
    cluster_id: work
    model: claude-haiku
  - role: coding_agent_architect
    cluster_id: work
    model: claude-sonnet
  - role: coding_agent_reviewer
    cluster_id: work
    model: claude-sonnet
  - role: devops_engineer
    cluster_id: work
    model: claude-haiku
  - role: ml_engineer
    cluster_id: work
    model: claude-haiku
